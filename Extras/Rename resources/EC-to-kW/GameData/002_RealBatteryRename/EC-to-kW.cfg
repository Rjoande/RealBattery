// RealBattery Recharged — Optional Extra
// EC-to-kW: renames Electric Charge to kW / kJ and Stored Charge to kWh
// throughout RealBattery's UI strings and selected third-party mods.
//
// Third-party coverage: Near Future Electrical, SystemHeat, DynamicBatteryStorage.
// Mods not listed may retain original EC labels.
//
// Installation: place this file in GameData/ (any subfolder works).
// Requires: Module Manager

Localization
{
	en-us
	{
		//---System
		#LOC_RB_guiUnitsECs = kW
		#LOC_RB_VAB_Info = Type: <<1>>\nDischarge rate: <<2>> kW\nCharge rate: <<3>> kW
		#LOC_RB_INF_Discharging = discharging, <<1>> kW
		#LOC_RB_INF_Charging = charging, <<1>> kW
		#LOC_RB_INF_idle = idle, <<1>>% kW

		//---(Extra) Replace EC and SC units
		#autoLOC_501004 = Electric Current // Electric Charge
		#autoLOC_6002100 = kJ // EC
		#autoLOC_234126 = kW // EC/s
		#autoLOC_7001414 = kW // EC/s

		#LOC_CRP_StoredCharge_Abbreviation = kWh

		//---NearFutureElectrical
		#LOC_NFElectrical_Units_EcS = kW
		#LOC_NFElectrical_ModuleDischargeCapacitor_Field_Status_Discharging = Discharging <<1>> kW
		#LOC_NFElectrical_ModuleDischargeCapacitor_Field_Status_Charging = Recharging <<1>> kW
		#LOC_NFElectrical_ModuleFissionGenerator_PartInfo = Power Generated: <<1>> kW
		#LOC_NFElectrical_ModuleFissionGenerator_Field_GeneratorStatus_Normal = <<1>> kW

		//---SystemHeat
		#LOC_SystemHeat_ModuleSystemHeatFissionReactor_Field_GeneratorStatus_Normal = <<1>> kW

		//---DynamicBatteryStorage
		#LOC_DynamicBatteryStorage_UI_ElectricalFlowUnits = kW
		#LOC_DynamicBatteryStorage_UI_ElectricalUnits = kJ
	}
}

