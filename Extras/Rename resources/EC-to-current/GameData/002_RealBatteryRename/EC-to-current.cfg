// RealBattery Recharged — Optional Extra
// EC-to-Current: renames "Electric Charge" to the local equivalent of "Electric Current"
// in all languages supported by RealBattery.
//
// Installation: place this file in GameData/ (any subfolder works).
// Requires: Module Manager

Localization
{
	en-us
	{
		#autoLOC_501004 = Electric Current // Electric Charge
		#LOC_RB_VAB_Info = This part stores electrical energy as Stored Charge (SC) and converts it to Electric Current (EC) at a fixed ratio of 1 SC = 3600 EC. Different battery chemistries offer varying charge rates, cycle durability, and thermal characteristics.\n<color=#00ffff><b>Battery volume:</b></color> <<1>> L
        #LOC_RB_VAB_Info_NoVolume = This part stores electrical energy as Stored Charge (SC) and converts it to Electric Current (EC) at a fixed ratio of 1 SC = 3600 EC. Different battery chemistries offer varying charge rates, cycle durability, and thermal characteristics.
	}
}

