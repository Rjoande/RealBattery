@PART[Knes_Command_K-IXV,Knes_Command_K-CEV,_Knes_ATV_Flat_Adapter,_Knes_ATV_SM,_Knes_STEAM_CrystalLab,_Knes_STEAM_Node,_Knes_STEAM_Power_Module,_Knes_STEAM_ScienceLab,_Knes_ATV_Adapter,_Knes_ATV_Cargo,_Knes_Vesta_CatPod_03125]:NEEDS[Knes]
{
    RBbaseVolume = #$/RESOURCE[ElectricCharge]/maxAmount$
    @RBbaseVolume *= 0.3

    @RESOURCE[ElectricCharge]
    {
        @maxAmount = #$../RBbaseVolume$
        @maxAmount *= 0.015
        @amount = #$../RBbaseVolume$
        @amount *= 0.015
    }
    RESOURCE
    {
        name = StoredCharge
        maxAmount = #$../RBbaseVolume$
        @maxAmount *= 0.02
        amount = #$../RBbaseVolume$
        @amount *= 0.02
    }

    MODULE
    {
        name = RealBattery
        ChemistryID = NiH2
    }
}

@PART[_Knes_Sat_Starlette,_Knes_Vesta_Avionic_03125,Knes_Command_Minus,_Knes_L3S_AR4_Avionics,_Knes_L3S_Avionics_250,_Knes_DiamantB_Avionics_0625,_Knes_Vega_Avum_Avionics_125,_Knes_DiamantBP4_Avionics_09375]:NEEDS[Knes]
