@PART[bluedog_Helios_Core,bluedog_IDCSP_Probe,bluedog_Biosat_Adapter,bluedog_Mariner_Bus,bluedog_OV1_1_probeCore,bluedog_OV1_10_probeCore,bluedog_Ranger_Lander_Truss,bluedog_Ranger_Block2_RoughLander,bluedog_Ranger_Battery,bluedog_Surveyor_Core,bluedog_Surveyor_AuxBattery]:NEEDS[Bluedog_DB]
{
    RBbaseVolume = #$/RESOURCE[ElectricCharge]/maxAmount$
    @RBbaseVolume *= 0.3

    @RESOURCE[ElectricCharge]
    {
        @maxAmount = #$../RBbaseVolume$
        @maxAmount *= 1.5
        @amount = #$../RBbaseVolume$
        @amount *= 1.5
    }
    RESOURCE
    {
        name = StoredCharge
        maxAmount = #$../RBbaseVolume$
        @maxAmount *= 0.15
        amount = #$../RBbaseVolume$
        @amount *= 0.15
    }

    MODULE
    {
        name = RealBattery
        ChemistryID = AgZn
    }
}

@PART[bluedog_AIMP_Core]:NEEDS[Bluedog_DB]
{
    RBbaseVolume = #$/RESOURCE[ElectricCharge]/maxAmount$
    @RBbaseVolume *= 0.3

    @RESOURCE[ElectricCharge]
    {
        @maxAmount = #$../RBbaseVolume$
        @maxAmount *= 0.25
        @amount = #$../RBbaseVolume$
        @amount *= 0.25
    }
    RESOURCE
    {
        name = StoredCharge
        maxAmount = #$../RBbaseVolume$
        @maxAmount *= 0.05
        amount = #$../RBbaseVolume$
        @amount *= 0.05
    }

    MODULE
    {
        name = RealBattery
        BatteryTypeDisplayName = Ag-Cd // Same as Ni-Cd but higher C-rate
        title = #LOC_RB_title_AgCd
        descriptionSummary = #LOC_RB_descSum_AgCd
        descriptionDetail = #LOC_RB_descDet_AgCd

        HighEClevel = 0.95
        LowEClevel  = 0.90
        Crate       = 1

        CycleDurability     = 500
        SelfDischargeRate   = 0.03
        EvaRefurbishEnabled = true
        EVAminLevel         = 1
        SparePartsPerKWh    = 14

        ThermalLoss         = 0.2
        TempOptimal         = 350
        TempOverheat        = 390
        TempRunaway         = 490
        RunawayHeatFactor   = 1

        FixedOutput         = false
        BatteryStaged       = false
        KeepWarmMode        = false
        TempKeepWarmLo      = 500
        TempKeepWarmHi      = 600
        SelfRunaway         = false
        RunawayBaseChance   = 0.0
        LifeDecay           = false
        InfiniteCycles      = false

        ChargeEfficiencyCurve
        {
            key = 0.0 0.70
            key = 0.5 0.75
            key = 0.9 0.80
            key = 1.0 0.65
        }
    }
}

