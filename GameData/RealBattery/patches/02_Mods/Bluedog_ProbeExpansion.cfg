@PART[bluedog_solarBattery]:NEEDS[Bluedog_DB]
{
    RBbaseVolume = #$/RESOURCE[ElectricCharge]/maxAmount$
    @RBbaseVolume *= 0.3

    @RESOURCE[ElectricCharge]
    {
        @maxAmount = #$../RBbaseVolume$
        @maxAmount *= 1.5
        @amount = #$../RBbaseVolume$
        @amount *= 1.5
    }
    RESOURCE
    {
        name = StoredCharge
        maxAmount = #$../RBbaseVolume$
        @maxAmount *= 0.15
        amount = #$../RBbaseVolume$
        @amount *= 0.15
    }

    MODULE
    {
        name = RealBattery
        ChemistryID = AgZn
        EVAupgrade  = none // target SUBTYPE name; "none" = upgrade prohibited
    }

    MODULE
    {
        name = ModuleB9PartSwitch
        moduleID = batterySwitch
        uiGroupName = RealBatteryInfo
        uiGroupDisplayName = #LOC_RB_PAWgroup
        switcherDescription = #LOC_RB_batterySwitcherDescription
        switcherDescriptionPlural = #LOC_RB_batterySwitcherDescriptionPlural
        baseVolume = #$../RBbaseVolume$

        SUBTYPE
        {
            name = AgZn
            title = #LOC_RB_title_AgZn
            descriptionSummary = #LOC_RB_descSum_AgZn
            descriptionDetail = #LOC_RB_descDet_AgZn
            tankType = AgZn
            //upgradeRequired = RB_UpgradeAgZn
            defaultSubtypePriority = 6
            MODULE
            {
                IDENTIFIER
                {
                    name = RealBattery
                }
                DATA
                {
                    ChemistryID = AgZn
                    EVAupgrade  = NiCd // target SUBTYPE name; "none" = upgrade prohibited
                }
            }
        }

        SUBTYPE
        {
            name = NiCd
            title = #LOC_RB_title_NiCd
            descriptionSummary = #LOC_RB_descSum_NiCd
            descriptionDetail = #LOC_RB_descDet_NiCd
            tankType = NiCd
            upgradeRequired = RB_UpgradeNiCd
            defaultSubtypePriority = 4
            MODULE
            {
                IDENTIFIER
                {
                    name = RealBattery
                }
                DATA
                {
                    ChemistryID = NiCd
                    EVAupgrade  = Li_ion // target SUBTYPE name; "none" = upgrade prohibited
                }
            }
        }

        SUBTYPE
        {
            name = Li_ion
            title = #LOC_RB_title_Li_ion
            descriptionSummary = #LOC_RB_descSum_Li_ion
            descriptionDetail = #LOC_RB_descDet_Li_ion
            tankType = Li_ion
            upgradeRequired = RB_UpgradeLiIon
            defaultSubtypePriority = 9
            MODULE
            {
                IDENTIFIER
                {
                    name = RealBattery
                }
                DATA
                {
                    ChemistryID = Li_ion
                    EVAupgrade  = none // target SUBTYPE name; "none" = upgrade prohibited
                }
            }
        }
    }
}

@PART[bluedog_Ranger_Bus]
{
	@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[realnameMeshSwitchStyle]]
	{
		@SUBTYPE[RangerB]
		{
            @RESOURCE[ElectricCharge]
            {
                @unitsPerVolume = 0.5
            }
			RESOURCE
            {
                name = StoredCharge
                unitsPerVolume = 0.05
                percentFilled = 100
            }
		}
		@SUBTYPE[MarinerB]
		{
			@RESOURCE[ElectricCharge]
            {
                @unitsPerVolume = 0.5
            }
			RESOURCE
            {
                name = StoredCharge
                unitsPerVolume = 0.05
                percentFilled = 100
            }
		}
	}
}

