@PART[ht2_questPod,ht2_ATA]:NEEDS[HabTech2]
{
    RESOURCE
    {
        name = ElectricCharge
        amount = 0
        maxAmount = 0
    }
    RESOURCE
    {
        name = StoredCharge
        amount = 0
        maxAmount = 0
    }

    MODULE
    {
        name = RealBattery
        ChemistryID = NiH2
        EVAupgrade  = none // target SUBTYPE name; "none" = upgrade prohibited
    }

    @MODULE[ModuleB9PartSwitch]:HAS[@SUBTYPE:HAS[#tankType[Battery]]]
    {
        @SUBTYPE:HAS[!tankType[Battery]]
        {
            MODULE
			{
				IDENTIFIER
				{
					name = RealBattery
				}
				DATA
                {
				    moduleActive = false
                }
			}
        }

        @SUBTYPE:HAS[#tankType[Battery]]
        {
            %title = #LOC_RB_title_NiH2
            %descriptionSummary = #LOC_RB_descSum_NiH2
            %descriptionDetail = #LOC_RB_descDet_NiH2
            @tankType = NiH2
            MODULE
            {
                IDENTIFIER
                {
                    name = RealBattery
                }
                DATA
                {
                    ChemistryID = NiH2
                    EVAupgrade  = Li_ion // target SUBTYPE name; "none" = upgrade prohibited
                    moduleActive = true
                }
            }
        }

        SUBTYPE
        {
            name = Li_ion
            title = #LOC_RB_title_Li_ion
            descriptionSummary = #LOC_RB_descSum_Li_ion
            descriptionDetail = #LOC_RB_descDet_Li_ion
            tankType = Li_ion
            upgradeRequired = RB_UpgradeLiIon
            MODULE
            {
                IDENTIFIER
                {
                    name = RealBattery
                }
                DATA
                {
                    ChemistryID = Li_ion
                    EVAupgrade  = none // target SUBTYPE name; "none" = upgrade prohibited
                    moduleActive = true
                }
            }
        }
    }
}

@PART[ht2_questPod]:NEEDS[HabTech2]
{
    RBbaseVolume = 20
}

@PART[ht2_ATA]:NEEDS[HabTech2]
{
    RBbaseVolume = 40
}