@PART[oldfightercockpit,zerocockpit,x1cockpit,b29cockpit]:NEEDS[AirplanePlus]
{
    RBbaseVolume = #$/RESOURCE[ElectricCharge]/maxAmount$
    @RBbaseVolume *= 0.3

    @RESOURCE[ElectricCharge]
    {
        @maxAmount = #$../RBbaseVolume$
        @maxAmount *= 0.3
        @amount = #$../RBbaseVolume$
        @amount *= 0.3
    }
    RESOURCE
    {
        name = StoredCharge
        maxAmount = #$../RBbaseVolume$
        @maxAmount *= 0.02
        amount = #$../RBbaseVolume$
        @amount *= 0.02
    }

    MODULE
    {
        name = RealBattery
        ChemistryID = PbAc
    }
}

@PART[oh6cockpit,hueycockpit,hipcockpit,herculescockpit,mk3galaxy,cessnacockpit,bellcockpit,bombardiercockpit,citationcockpit,airbuscockpit]:NEEDS[AirplanePlus]
{
    RBbaseVolume = #$/RESOURCE[ElectricCharge]/maxAmount$
    @RBbaseVolume *= 0.3

    @RESOURCE[ElectricCharge]
    {
        @maxAmount = #$../RBbaseVolume$
        @maxAmount *= 0.3
        @amount = #$../RBbaseVolume$
        @amount *= 0.3
    }
    RESOURCE
    {
        name = StoredCharge
        maxAmount = #$../RBbaseVolume$
        @maxAmount *= 0.02
        amount = #$../RBbaseVolume$
        @amount *= 0.02
    }

    MODULE
    {
        name = RealBattery
        ChemistryID = PbAc
        EVAupgrade  = none // target SUBTYPE name; "none" = upgrade prohibited
    }

    MODULE
    {
        name = ModuleB9PartSwitch
        moduleID = batterySwitch
        uiGroupName = RealBatteryInfo
        uiGroupDisplayName = #LOC_RB_PAWgroup
        switcherDescription = #LOC_RB_batterySwitcherDescription
        switcherDescriptionPlural = #LOC_RB_batterySwitcherDescriptionPlural
        baseVolume = #$../RBbaseVolume$

        SUBTYPE
        {
            name = PbAc
            title = #LOC_RB_title_PbAc
            descriptionSummary = #LOC_RB_descSum_PbAc
            descriptionDetail = #LOC_RB_descDet_PbAc
            tankType = PbAc
            defaultSubtypePriority = 1

            MODULE
            {
                IDENTIFIER
                {
                    name = RealBattery
                }
                DATA
                {
                    ChemistryID = PbAc
                    EVAupgrade  = NiCd // target SUBTYPE name; "none" = upgrade prohibited
                }
            }
        }

        SUBTYPE
        {
            name = NiCd
            title = #LOC_RB_title_NiCd
            descriptionSummary = #LOC_RB_descSum_NiCd
            descriptionDetail = #LOC_RB_descDet_NiCd
            tankType = NiCd
            upgradeRequired = RB_UpgradeNiCd
            defaultSubtypePriority = 4
            MODULE
            {
                IDENTIFIER
                {
                    name = RealBattery
                }
                DATA
                {
                    ChemistryID = NiCd
                    EVAupgrade  = none // target SUBTYPE name; "none" = upgrade prohibited
                }
            }
        }
    }
}

