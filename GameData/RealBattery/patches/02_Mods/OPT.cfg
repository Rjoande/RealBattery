@PART[h_*,i_*,ij_*,j_*,mk2j_*,jk_*,kh_*,k_*,mk2_nose_opt,opt_*,ab_*,a_*,jl_*,l_*,b2_*,b_*,mk2b_adaptor,wing_1a]:HAS[@MODULE[ModuleB9PartSwitch]:HAS[@SUBTYPE:HAS[#tankType[Battery]]],!MODULE[RealBattery]]:NEEDS[OPT]
{
    RBbaseVolume *= #$refVolume$

    %RESOURCE[ElectricCharge]
    {
        %name = ElectricCharge
        %amount = 0
        %maxAmount = 0
    }
    RESOURCE
    {
        name = StoredCharge
        amount = 0
        maxAmount = 0
    }

    MODULE
    {
        name = RealBattery
        ChemistryID = Li_poly
        EVAupgrade  = none // target SUBTYPE name; "none" = upgrade prohibited
    }

    @MODULE[ModuleB9PartSwitch]:HAS[@SUBTYPE:HAS[#tankType[Battery]]]
    {
        @SUBTYPE:HAS[!tankType[Battery]],*
        {
            MODULE
			{
				IDENTIFIER
				{
					name = RealBattery
				}
				DATA
                {
				    moduleActive = false
                }
			}
        }

        @SUBTYPE:HAS[#tankType[Battery]]
        {
            %title = #LOC_RB_title_Li_poly
            %descriptionSummary = #LOC_RB_descSum_Li_poly
            %descriptionDetail = #LOC_RB_descDet_Li_poly
            %tankType = Li_poly
            MODULE
            {
                IDENTIFIER
                {
                    name = RealBattery
                }
                DATA
                {
                    ChemistryID = Li_poly
                    EVAupgrade  = Graphene // target SUBTYPE name; "none" = upgrade prohibited
                    moduleActive = true
                }
            }
        }

        SUBTYPE
        {
            name = Graphene
            title = #LOC_RB_title_Graphene
            descriptionSummary = #LOC_RB_descSum_Graphene
            descriptionDetail = #LOC_RB_descDet_Graphene
            tankType = Graphene
            upgradeRequired = RB_UpgradeGraphene
            MODULE
            {
                IDENTIFIER
                {
                    name = RealBattery
                }
                DATA
                {
                    ChemistryID = Graphene
                    EVAupgrade  = none // target SUBTYPE name; "none" = upgrade prohibited
                    moduleActive = true
                }
            }
        }

        SUBTYPE
        {
            name = NukeCell
            title = #LOC_RB_short_Nuke
            descriptionSummary = #LOC_RB_descSum_Nuke
            descriptionDetail = #LOC_RB_descDet_Nuke
            tankType = NukeCell
            upgradeRequired = RB_UpgradeNuke
            defaultSubtypePriority = 1
            MODULE
            {
                IDENTIFIER
                {
                    name = RealBattery
                }
                DATA
                {
                    ChemistryID = NukeCell
                    EVAupgrade  = none // target SUBTYPE name; "none" = upgrade prohibited
                    moduleActive = true
                }
            }
        }
        
        SUBTYPE
        {
            name = HoCell
            title = #LOC_RB_title_HoCell
            descriptionSummary = #LOC_RB_descSum_HoCell
            descriptionDetail = #LOC_RB_descDet_HoCell
            tankType = RB_HoCell
            upgradeRequired = RB_UpgradeHoCell
            defaultSubtypePriority = 1
            MODULE
            {
                IDENTIFIER
                {
                    name = RealBattery
                }
                DATA
                {
                    ChemistryID = HoCell
                    EVAupgrade  = none // target SUBTYPE name; "none" = upgrade prohibited
                    moduleActive = true
                }
            }
        }
    }
}