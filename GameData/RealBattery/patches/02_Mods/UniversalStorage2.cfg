@PART[USBatteryWedge]
{   
    RBbaseVolume = 300

    @cost = 600
    @mass = 0.25
    
    RESOURCE
    {
        name = ElectricCharge
        amount = 0
        maxAmount = 0
    }
    RESOURCE
    {
        name = StoredCharge
        amount = 0
        maxAmount = 0
    }

    MODULE
	{
        name = RealBattery
        ChemistryID = NiZn
	}

    @MODULE
	{
		@resourceNames = StoredCharge,ElectricCharge;StoredCharge,ElectricCharge;StoredCharge,ElectricCharge;StoredCharge,ElectricCharge
		@resourceAmounts = 15,450;30,900;45,1350;60,1800
		@initialResourceAmounts = 15,450;30,880;45,1350;60,1800
		@tankCost = 0;600;1200;1800
		@tankMass = 0;0.25;0.5;0.75
	}
}

@PART[USSingleProbeCore,USDoubleProbeCore]
{
    RBbaseVolume = #$/RESOURCE[ElectricCharge]/maxAmount$
    @RBbaseVolume *= 0.3

    @RESOURCE[ElectricCharge]
    {
        @maxAmount = #$../RBbaseVolume$
        @maxAmount *= 3
        @amount = #$../RBbaseVolume$
        @amount *= 3
    }
    RESOURCE
    {
        name = StoredCharge
        maxAmount = #$../RBbaseVolume$
        @maxAmount *= 0.09
        amount = #$../RBbaseVolume$
        @amount *= 0.09
    }

    MODULE
	{
        name = RealBattery
        ChemistryID = NiZn
	}
}

@PART[USAdvancedMicroSatWedge]
{
    RBbaseVolume = #$/RESOURCE[ElectricCharge]/maxAmount$
    @RBbaseVolume *= 0.3

    @RESOURCE[ElectricCharge]
    {
        @maxAmount = #$../RBbaseVolume$
        @maxAmount *= 3
        @amount = #$../RBbaseVolume$
        @amount *= 3
    }
    RESOURCE
    {
        name = StoredCharge
        maxAmount = #$../RBbaseVolume$
        @maxAmount *= 0.09
        amount = #$../RBbaseVolume$
        @amount *= 0.09
    }

    MODULE
	{
        name = RealBattery
        ChemistryID = NiZn
	}

    MODULE
    {
        name = ModuleB9PartSwitch
        moduleID = batterySwitch
        uiGroupName = RealBatteryInfo
        uiGroupDisplayName = #LOC_RB_PAWgroup
        switcherDescription = #LOC_RB_batterySwitcherDescription
		switcherDescriptionPlural = #LOC_RB_batterySwitcherDescriptionPlural
        baseVolume = #$../RBbaseVolume$

        SUBTYPE
        {
            name = NiZn
            title = #LOC_RB_title_NiZn
            descriptionSummary = #LOC_RB_descSum_NiZn
            descriptionDetail = #LOC_RB_descDet_NiZn
            tankType = NiZn
            defaultSubtypePriority = 3
            MODULE
            {
                IDENTIFIER
                {
                    name = RealBattery
                }
                DATA
                {
                    ChemistryID = NiZn
                    EVAupgrade  = Li_poly
                }
            }
        }

        SUBTYPE
        {
            name = Li_poly
            title = #LOC_RB_title_Li_poly
            descriptionSummary = #LOC_RB_descSum_Li_poly
            descriptionDetail = #LOC_RB_descDet_Li_poly
            tankType = Li_poly
            upgradeRequired = RB_UpgradeLiPoly
            defaultSubtypePriority = 2
            MODULE
            {
                IDENTIFIER
                {
                    name = RealBattery
                }
                DATA
                {
                    ChemistryID = Li_poly
                    EVAupgrade  = Graphene
                }
            }
        }

        SUBTYPE
        {
            name = Graphene
            title = #LOC_RB_title_Graphene
            descriptionSummary = #LOC_RB_descSum_Graphene
            descriptionDetail = #LOC_RB_descDet_Graphene
            tankType = Graphene
            upgradeRequired = RB_UpgradeGraphene
            defaultSubtypePriority = 1
            MODULE
            {
                IDENTIFIER
                {
                    name = RealBattery
                }
                DATA
                {
                    ChemistryID = Graphene
                    EVAupgrade  = none // target SUBTYPE name; "none" = upgrade prohibited
                }
            }
        }
    }
}

@PART[USBasicMicroSatWedge]
{
    RBbaseVolume = #$/RESOURCE[ElectricCharge]/maxAmount$
    @RBbaseVolume *= 0.3

    @RESOURCE[ElectricCharge]
    {
        @maxAmount = #$../RBbaseVolume$
        @maxAmount *= 0.3
        @amount = #$../RBbaseVolume$
        @amount *= 0.3
    }
    RESOURCE
    {
        name = StoredCharge
        maxAmount = #$../RBbaseVolume$
        @maxAmount *= 0.02
        amount = #$../RBbaseVolume$
        @amount *= 0.02
    }

    MODULE
    {
        name = RealBattery
        ChemistryID = PbAc
        EVAupgrade  = none // target SUBTYPE name; "none" = upgrade prohibited
    }

    MODULE
    {
        name = ModuleB9PartSwitch
        moduleID = batterySwitch
        uiGroupName = RealBatteryInfo
        uiGroupDisplayName = #LOC_RB_PAWgroup
        switcherDescription = #LOC_RB_batterySwitcherDescription
		switcherDescriptionPlural = #LOC_RB_batterySwitcherDescriptionPlural
