            descriptionSummary = #LOC_RB_descSum_PbAc
            descriptionDetail = #LOC_RB_descDet_PbAc
            tankType = PbAc
            defaultSubtypePriority = 3

            MODULE
            {
                IDENTIFIER
                {
                    name = RealBattery
                }
