        }

        SUBTYPE
        {
            name = Li_poly
            title = #LOC_RB_title_Li_poly
            descriptionSummary = #LOC_RB_descSum_Li_poly
            descriptionDetail = #LOC_RB_descDet_Li_poly
            tankType = Li_poly
            upgradeRequired = RB_UpgradeLiPoly
            defaultSubtypePriority = 1
            MODULE
            {
                IDENTIFIER
                {
                    name = RealBattery
                }
                DATA
                {
                    ChemistryID = Li_poly
                    EVAupgrade  = none // target SUBTYPE name; "none" = upgrade prohibited
                }
            }
        }
    }
}

@PART[USEVAX]                          // add dummy Module to prevent RB from adding batteries to the nuclear reactor
{
    RESOURCE
    {
        name = StoredCharge
        maxAmount = 0
        amount = 0
    }
    MODULE
    {
        name = RealBattery
    }
}

@PART[USEVAX]:AFTER[ZZZ_REALBATTERY]   // cleanup dummy RB Module
{
    !RESOURCE[StoredCharge]
    {}
    !MODULE[RealBattery]
    {}
}