        #LOC_RB_descSum_HgZn = <b>Indice di carica:</b? 0.5C\n<b>Disp. termica:</b> 30% (T° max: 420 K)\n<b>Autoscarica:</b> 2.5%/giorno\n<#FF0000>Non ricaricabile</color>
        #LOC_RB_descDet_HgZn = Le batterie al mercurio-zinco offrono una tensione di scarica straordinariamente stabile, rendendole la scelta preferita quando la costanza dell'output è più importante della durata. Ampiamente usate nei primi programmi spaziali, prima che le preoccupazioni ambientali le rendessero in gran parte obsolete. Ancora affidabili. Ancora mercuriali.
