        #LOC_RB_descDet_HgZn = Les batteries mercure-zinc offrent une tension de décharge exceptionnellement stable, ce qui en fait le choix privilégié lorsque la constance de la sortie prime sur la longévité en cycles. Largement utilisées dans les premiers programmes spatiaux, avant que les préoccupations environnementales ne les rendent largement obsolètes. Toujours fiables. Toujours mercurielles.
