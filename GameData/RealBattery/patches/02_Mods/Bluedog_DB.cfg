@PART[bluedog_ThorAble_Guidance,bluedog_Agena_Avionics,bluedog_GATV_MaterialsBay,bluedog_Corona_Pod,bluedog_Keyhole_OCV_KH7,bluedog_Oscar1,bluedog_Strawman_Bus,bluedog_atlas_coreTank,bluedog_Atlas_SCORE,bluedog_Atlas_SLV3X_coreTank,bluedog_CELV_MainTank,bluedog_AtlasV_CCB_lower,bluedog_Delta_Avionics,bluedog_DeltaE_Tank,bluedog_Juno4_FuelTank_2,bluedog_Jupiter_Guidance,bluedog_LDC_S2_Avionics,bluedog_Mercury_Capsule,bluedog_HOSS_Avionics,bluedog_Ablestar_Tank,bluedog_Vanguard_S2_Guidance,bluedog_Vanguard_Satellite1,bluedog_Vanguard_Satellite2,bluedog_Vanguard_Satellite3,bluedog_IUS_Avionics,bluedog_TOS_Avionics,bluedog_X15_Cockpit,bluedog_X15_DroneCore,bluedog_X15_TwoSeater]:NEEDS[Bluedog_DB]
{
    RBbaseVolume = #$/RESOURCE[ElectricCharge]/maxAmount$
    @RBbaseVolume *= 0.3

    @RESOURCE[ElectricCharge]
    {
        @maxAmount = #$../RBbaseVolume$
        @maxAmount *= 1.5
        @amount = #$../RBbaseVolume$
        @amount *= 1.5
    }
    RESOURCE
    {
        name = StoredCharge
        maxAmount = #$../RBbaseVolume$
        @maxAmount *= 0.15
        amount = #$../RBbaseVolume$
        @amount *= 0.15
    }

    MODULE
    {
        name = RealBattery
        ChemistryID = AgOx
    }
}

@PART[bluedog_Sparta_Guidance,bluedog_WRESAT,bluedog_Redstone_Guidance,bluedog_Beacon1,bluedog_Juno1_Explorer1,bluedog_Juno1_Guidance]:NEEDS[Bluedog_DB]
{
    RBbaseVolume = #$/RESOURCE[ElectricCharge]/maxAmount$
    @RBbaseVolume *= 0.3

    @RESOURCE[ElectricCharge]
    {
        @maxAmount = #$../RBbaseVolume$
        @maxAmount *= 1.5
        @amount = #$../RBbaseVolume$
        @amount *= 1.5
    }
    RESOURCE
    {
        name = StoredCharge
        maxAmount = #$../RBbaseVolume$
        @maxAmount *= 0.15
        amount = #$../RBbaseVolume$
        @amount *= 0.15
    }

    MODULE
    {
        name = RealBattery
        BatteryTypeDisplayName = Hg-Zn // Same as Ag-Ox but lower C-rate
        title = #LOC_RB_title_HgZn
        descriptionSummary = #LOC_RB_descSum_HgZn
        descriptionDetail = #LOC_RB_descDet_HgZn

        HighEClevel = 2       // charging disabled
        LowEClevel  = 0.90
        Crate       = 0.5

        CycleDurability     = 1
        SelfDischargeRate   = 0.025
        EvaRefurbishEnabled = true
        EVAminLevel         = 1
        SparePartsPerKWh    = 5

        ThermalLoss         = 0.3
        TempOptimal         = 350
        TempOverheat        = 420
        TempRunaway         = 520
        RunawayHeatFactor   = 1.5

        FixedOutput         = false
        BatteryStaged       = false
        KeepWarmMode        = false
        TempKeepWarmLo      = 500
        TempKeepWarmHi      = 600
        SelfRunaway         = false
        RunawayBaseChance   = 0.0
        LifeDecay           = false
        InfiniteCycles      = false

        ChargeEfficiencyCurve
        {
            key = 0.0 0.0
            key = 1.0 0.0
        }
    }
}

@PART[bluedog_Mercury_Retropack]:NEEDS[Bluedog_DB]
{
    RBbaseVolume = 24

    RESOURCE
    {
        name = ElectricCharge
        amount = 0
        maxAmount = 0
    }
    RESOURCE
    {
        name = StoredCharge
        amount = 0
        maxAmount = 0
    }

    MODULE
    {
        name = RealBattery
        ChemistryID = AgOx
    }

    @MODULE[ModuleB9PartSwitch]:HAS[#moduleID[meshSwitchStyle]]
    {
        @SUBTYPE[Basic]
        {
            MODULE
			{
				IDENTIFIER
				{
					name = RealBattery
				}
				DATA
                {
				    moduleActive = false
                }
			}
        }
        @SUBTYPE[Enhanced]
        {
            @RESOURCE[ElectricCharge]
			{
				@unitsPerVolume = 35
			}
            RESOURCE
            {
                name = StoredCharge
                unitsPerVolume = 4
            }
            MODULE
			{
				IDENTIFIER
				{
					name = RealBattery
				}
				DATA
                {
				    moduleActive = true
                }
			}
        }
    }
}

