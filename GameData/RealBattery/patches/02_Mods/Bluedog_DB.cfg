        #LOC_RB_descDet_HgZn = 汞锌电池放电电压极为平稳，在输出稳定性优先于循环寿命的场合是首选。早期航天项目中广泛使用，后因环保问题逐渐淡出主流。依然可靠。依然"反复无常"。
