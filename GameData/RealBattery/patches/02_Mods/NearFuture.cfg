@PART[truss-octo-drone-01]:NEEDS[NearFutureConstruction]
{
    RBbaseVolume = #$/RESOURCE[ElectricCharge]/maxAmount$
    @RBbaseVolume *= 0.3

    @RESOURCE[ElectricCharge]
    {
        @maxAmount = #$../RBbaseVolume$
        @maxAmount *= 4
        @amount = #$../RBbaseVolume$
        @amount *= 4
    }
    RESOURCE
    {
        name = StoredCharge
        maxAmount = #$../RBbaseVolume$
        @maxAmount *= 0.2
        amount = #$../RBbaseVolume$
        @amount *= 0.2
    }

    MODULE
    {
        name = RealBattery
        ChemistryID = Li_poly
        EVAupgrade  = none // target SUBTYPE name; "none" = upgrade prohibited
    }

    MODULE
    {
        name = ModuleB9PartSwitch
        moduleID = batterySwitch
        uiGroupName = RealBatteryInfo
        uiGroupDisplayName = #LOC_RB_PAWgroup
        switcherDescription = #LOC_RB_batterySwitcherDescription
        switcherDescriptionPlural = #LOC_RB_batterySwitcherDescriptionPlural
        baseVolume = #$../RBbaseVolume$

        SUBTYPE
        {
            name = Li_poly
            title = #LOC_RB_title_Li_poly
            descriptionSummary = #LOC_RB_descSum_Li_poly
            descriptionDetail = #LOC_RB_descDet_Li_poly
            tankType = Li_poly
            defaultSubtypePriority = 10
            MODULE
            {
                IDENTIFIER
                {
                    name = RealBattery
                }
                DATA
                {
                    ChemistryID = Li_poly
                    EVAupgrade  = Graphene // target SUBTYPE name; "none" = upgrade prohibited
                }
            }
        }

        SUBTYPE
        {
            name = Graphene
            title = #LOC_RB_title_Graphene
            descriptionSummary = #LOC_RB_descSum_Graphene
            descriptionDetail = #LOC_RB_descDet_Graphene
            tankType = Graphene
            upgradeRequired = RB_UpgradeGraphene
            defaultSubtypePriority = 11
            MODULE
            {
                IDENTIFIER
                {
                    name = RealBattery
                }
                DATA
                {
                    ChemistryID = Graphene
                    EVAupgrade  = none // target SUBTYPE name; "none" = upgrade prohibited
                }
            }
        }
    }
}

