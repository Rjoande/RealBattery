@PART:HAS[@MODULE[ModuleB9PartSwitch]:HAS[@SUBTYPE:HAS[#tankType[Battery]]],!MODULE[RealBattery]]
{
    %RESOURCE[ElectricCharge]
    {
        %name = ElectricCharge
        %amount = 0
        %maxAmount = 0
    }
    RESOURCE
    {
        name = StoredCharge
        amount = 0
        maxAmount = 0
    }

    MODULE
    {
        name = RealBattery
        ChemistryID = NiZn
    }

    @MODULE[ModuleB9PartSwitch]:HAS[@SUBTYPE:HAS[#tankType[Battery]]]
    {
        @SUBTYPE:HAS[!tankType[Battery]]
        {
            MODULE
			{
				IDENTIFIER
				{
					name = RealBattery
				}
				DATA
                {
				    moduleActive = false
                }
			}
        }

        @SUBTYPE:HAS[#tankType[Battery]]
        {
            %descriptionSummary = #LOC_RB_descSum_NiZn
            %descriptionDetail = #LOC_RB_descDet_NiZn
            @tankType = NiZn
            MODULE
            {
                IDENTIFIER
                {
                    name = RealBattery
                }
                DATA
                {
                    ChemistryID = NiZn
                    moduleActive = true
                }
            }
        }
    }
}