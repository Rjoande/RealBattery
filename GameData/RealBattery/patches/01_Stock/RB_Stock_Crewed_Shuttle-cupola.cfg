@PART[mk3Cockpit_Shuttle,cupola]
{
    RBbaseVolume = #$/RESOURCE[ElectricCharge]/maxAmount$
    @RBbaseVolume *= 0.3

    @RESOURCE[ElectricCharge]
    {
        @maxAmount = #$../RBbaseVolume$
        @maxAmount *= 0.015
        @amount = #$../RBbaseVolume$
        @amount *= 0.015
    }
    RESOURCE
    {
        name = StoredCharge
        maxAmount = #$../RBbaseVolume$
        @maxAmount *= 0.02
        amount = #$../RBbaseVolume$
        @amount *= 0.02
    }

    MODULE
    {
        name = RealBattery
        ChemistryID = NiH2
        EVAupgrade  = none // target SUBTYPE name or "none" to disable EVA upgrade for this part
    }

    MODULE
    {
        name = ModuleB9PartSwitch
        moduleID = batterySwitch
        uiGroupName = RealBatteryInfo
        uiGroupDisplayName = #LOC_RB_PAWgroup
        switcherDescription = #LOC_RB_batterySwitcherDescription
        switcherDescriptionPlural = #LOC_RB_batterySwitcherDescriptionPlural
        baseVolume = #$../RBbaseVolume$

        SUBTYPE
        {
            name = NiH2
            title = #LOC_RB_title_NiH2
            descriptionSummary = #LOC_RB_descSum_NiH2
            descriptionDetail = #LOC_RB_descDet_NiH2
            tankType = NiH2
            defaultSubtypePriority = 7
            MODULE
            {
                IDENTIFIER
                {
                    name = RealBattery
                }
                DATA
                {
                    ChemistryID = NiH2
                    EVAupgrade  = Li_ion // target SUBTYPE name or "none" to disable EVA upgrade for this part
                }
            }
        }
        
        SUBTYPE
        {
            name = Li_ion
            title = #LOC_RB_title_Li_ion
            descriptionSummary = #LOC_RB_descSum_Li_ion
            descriptionDetail = #LOC_RB_descDet_Li_ion
            tankType = Li_ion
            upgradeRequired = RB_UpgradeLiIon
            defaultSubtypePriority = 9
            MODULE
            {
                IDENTIFIER
                {
                    name = RealBattery
                }
                DATA
                {
                    ChemistryID = Li_ion
                    EVAupgrade  = SSB // target SUBTYPE name or "none" to disable EVA upgrade for this part
                }
            }
        }
        
        SUBTYPE
        {
            name = VRFB
            title = #LOC_RB_title_VRFB
            descriptionSummary = #LOC_RB_descSum_VRFB
            descriptionDetail = #LOC_RB_descDet_VRFB
            tankType = RB_VRFB
            upgradeRequired = RB_UpgradeVRFB
            defaultSubtypePriority = 8
            MODULE
            {
                IDENTIFIER
                {
                    name = RealBattery
                }
                DATA
                {
                    ChemistryID = VRFB
                    EVAupgrade  = none // target SUBTYPE name or "none" to disable EVA upgrade for this part
                }
            }
        }

        SUBTYPE
        {
            name = SSB
            title = #LOC_RB_title_SSB
            descriptionSummary = #LOC_RB_descSum_SSB
            descriptionDetail = #LOC_RB_descDet_SSB
            tankType = SSB
            upgradeRequired = RB_UpgradeSSB
            defaultSubtypePriority = 12
            MODULE
            {
                IDENTIFIER
                {
                    name = RealBattery
                }
                DATA
                {
                    ChemistryID = SSB
                    EVAupgrade  = none // target SUBTYPE name or "none" to disable EVA upgrade for this part
                }
            }
        }
    }
}