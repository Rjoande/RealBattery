        #LOC_RB_short_Li_poly = 锂聚
        #LOC_RB_descSum_Li_poly = C 倍率：3C \n热损：25%（T° 最高：420 K）\n自放电：1.5%/天 \n寿命：500 次循环
        #LOC_RB_descDet_Li_poly = 锂离子电芯的柔性紧凑变种，适合轻小探测器与无人机。别加热。千万别。

        #LOC_RB_title_Graphene = 石墨烯
