        #LOC_RB_descSum_AgOx = C 倍率：1C \n热损：30%（T° 最高：370 K）\n自放电：2.5%/天 \n<#FF0000>不可充电</color>
        #LOC_RB_descDet_AgOx = 简单的高能量密度电池，自早期航天沿用至今。劲大，但一次性。

        #LOC_RB_title_AgZn = 银锌
        #LOC_RB_short_AgZn = 银锌
        #LOC_RB_descSum_AgZn = C 倍率：1.5C \n热损：30%（T° 最高：370 K）\n自放电：2.5%/天 \n寿命：50 次循环
        #LOC_RB_descDet_AgZn = 氧化银的可充进化版。强劲（也昂贵）得像小火箭！适合猛放电，别指望用很久。

        #LOC_RB_title_NiH2 = 镍氢
        #LOC_RB_short_NiH2 = 镍氢
        #LOC_RB_descSum_NiH2 = C 倍率：0.3C \n热损：15%（T° 最高：360 K）\n自放电：15%/天 \n寿命：20,000 次循环
        #LOC_RB_descDet_NiH2 = 相较其他可充电池，镍氢比能量不错且极长寿，适合监测卫星等长周期任务。

