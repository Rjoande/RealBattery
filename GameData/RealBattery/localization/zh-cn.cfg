        #LOC_RB_descDet_Zebra = K.E.R.B.A.（Kalium Exothermal Research Battery for Aerospace）功率不算顶，但不自放电、不怕热。说不定是船上最后幸存的部件。<#FF0000>运行前须达到工作温度。</color>

