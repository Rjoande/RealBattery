        #LOC_RB_descDet_PbAc = 最古老的可充电池：皮实、便宜、可预期，但又重又低效。适合不赶时间或别无选择时。

        #LOC_RB_title_NiCd = 镍镉
        #LOC_RB_short_NiCd = 镍镉
        #LOC_RB_descSum_NiCd = C 倍率：0.5C \n热损：20%（T° 最高：340 K）\n自放电：3%/天 \n寿命：500 次循环
        #LOC_RB_descDet_NiCd = 镍系电池坚固可靠，是多种用途下性价比高、表现均衡的选择。缺点是没有哪项特别拔尖。

        #LOC_RB_title_NiZn = 镍锌
        #LOC_RB_short_NiZn = 镍锌
        #LOC_RB_descSum_NiZn = C 倍率：0.7C \n热损：15%（T° 最高：340 K）\n自放电：4%/天 \n寿命：800 次循环
        #LOC_RB_descDet_NiZn = 坚固先进，电压与能量密度高于镍镉或镍氢。性价比不错，但循环寿命较短，满电时发热更大。

