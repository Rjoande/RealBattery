        #LOC_RB_descSum_SSB = C 倍率：2C \n热损：5%（T° 最高：470 K）\n自放电：0.3%/天 \n寿命：10,000 次循环
        #LOC_RB_descDet_SSB = 终极形态：没有液体，没有爆炸（大概）。性能与热稳定性拉满，价格让会计落泪。

        #LOC_RB_title_Nuke = 亚稳态铪
        #LOC_RB_short_Nuke = Hf-178m2
        #LOC_RB_descSum_Nuke = C 倍率：0.001C \\n热损：12%（T° 最高：1500 K）\\n半衰期：~30 年 \\n<#FF0000>不可充电</color>
        #LOC_RB_descDet_Nuke = 这种异类电池把能量存进可用辐射诱发脉冲（R.I.P.）按需触发衰变的核同位素。与传统 RTG 不同，输出功率可调，无需完整反应堆也能灵活供电。\\n<#FF0000>存在低但非零的自发失控概率。</color>\\n<#FF0000>不可进行 EVA 维护。</color>

        #LOC_RB_title_VRFB = 钒液流
        #LOC_RB_short_VRFB = 液流电池
        #LOC_RB_descSum_VRFB = C 倍率：0.2C \\n热损：2%（最高温度：320 K）\\n自放电：0.4%/年 \\n寿命：40,000 次循环
        #LOC_RB_descDet_VRFB = 将能量储存在液态钒电解质罐中的液流电池。循环寿命极长，自放电几乎为零，代价是 C 倍率极低。适合需要长期可靠储能、无需担心电池老化的大型空间站与飞行器。

        #LOC_RB_title_MgSb = 镁锑
        #LOC_RB_short_MgSb = 液金电池
        #LOC_RB_descSum_MgSb = C 倍率：1C \\n热损：25%（最高温度：1500 K）\\n自放电：0% \\n寿命：30,000 次循环
        #LOC_RB_descDet_MgSb = 工作于 700–1000 K 的液态金属电池，以熔融镁与锑为电极，熔盐为电解质。往返效率出色，循环寿命近乎无限，但电芯必须始终保持熔融状态。让它冷却，你就得到一块非常昂贵的镇纸。\\n<#FF0000>运行前须达到工作温度。</color>\\n<#FF0000>不可进行 EVA 维护。</color>

        #LOC_RB_title_SMES = 超导体
