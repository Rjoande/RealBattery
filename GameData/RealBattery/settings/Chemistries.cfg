// RealBattery Recharged — Central Chemistry Database
// v3.0.0
//
// Each REALBATTERY_CHEMISTRY node defines a complete chemistry profile.
// Part configs reference a chemistry by name via ChemistryID
// If ChemistryID is absent or unresolved, RealBattery falls back to reading
// parameters inline from the part cfg (full v2.x backward compatibility).
//
// Field reference:
//   KeepWarmMode   : false | warm | cryo
//                    false = no upkeep logic
//                    warm  = upkeep required BELOW TempKeepWarmHi (molten-salt logic)
//                    cryo  = upkeep required ABOVE TempKeepWarmLo (cryogenic logic)
//   InfiniteCycles : true = no charge/discharge wear (SMES)
//   SelfRunaway    : true
//   RunawayBaseChance   = 0.0 = hourly chance of spontaneous thermal runaway (Hf cells)
//   LifeDecay      : true = SelfDischargeRate decays BatteryLife instead of SoC (radioactive cells)
//   EVAminLevel    : minimum Engineer star level required for EVA refurbish/upgrade (0-5)


