// RealBatteryExpansion — HoCell — definitions
// Migrated from core RealBattery (Phase 2). Self-contained:
//   REALBATTERY_CHEMISTRY (from settings/Chemistries.cfg)
//   B9_TANK_TYPE          (from settings/B9TankTypes.cfg)
//   dummy icon PART       (from settings/upgrades_subtypes.cfg) — asset path repointed to Assets/
//   PARTUPGRADE + CTT override (from settings/upgrades_subtypes.cfg)

// ============================================================
//  HOLMIUM-166m  (metastable nuclear isomer, interstellar grade)
//  Half-life ~1200 years. After a 300-year mission: ~84% BatteryLife remains.
//  SelfRunaway = true hourly chance of spontaneous RIP event (lower than Hf).
//  LifeDecay   = true: SelfDischargeRate targets BatteryLife, not SoC.
// ============================================================
REALBATTERY_CHEMISTRY
{
    ChemistryID = HoCell
    displayName = #LOC_RB_short_HoCell
    title = #LOC_RB_title_HoCell
    descriptionSummary = #LOC_RB_descSum_HoCell
    descriptionDetail = #LOC_RB_descDet_HoCell

    HighEClevel = 2       // charging disabled
    LowEClevel  = 0.90
    Crate       = 0.05    // lower than Hf: more stable isotope, slower stimulated release

    CycleDurability     = 1
    SelfDischargeRate   = 0.00000136  // t½ ~1200 years (Stock calendar)
    EvaRefurbishEnabled = false
    EVAminLevel         = 5
    SparePartsPerKWh    = 16

    ThermalLoss         = 0.06
    TempOptimal         = 800
    TempOverheat        = 1800
    TempRunaway         = 2500
    RunawayHeatFactor   = 400

    FixedOutput         = false
    BatteryStaged       = false
    KeepWarmMode        = false
    TempKeepWarmLo      = 500
    TempKeepWarmHi      = 600
    SelfRunaway         = true
    RunawayBaseChance   = 0.01    // hourly chance of spontaneous RIP event
    LifeDecay           = true    // SelfDischargeRate targets BatteryLife, not SoC
    InfiniteCycles      = false

    ChargeEfficiencyCurve
    {
        key = 0.0 0.0
        key = 1.0 0.0
    }
}

B9_TANK_TYPE
{
	name = RB_HoCell
    primaryColor = #1A2B1A
    secondaryColor = #39FF14
	tankMass = 0.006
	tankCost = 280

	RESOURCE
	{
		name = ElectricCharge
		unitsPerVolume = 0.50
	}

	RESOURCE
	{
		name = StoredCharge
		unitsPerVolume = 0.90
	}
}

//Dummy part for icon:
PART
{
	name = RB_HoCell
	module = Part
	author = Rjoande
	MODEL
	{
		model = RealBatteryExpansion/HoCell/Assets/PartUpgrade/model
	}
	rescaleFactor = 1
	attachRules = 0,0,0,0,0
	TechRequired = HIDDEN
	TechHidden = true
	entryCost = 0
	cost = 0
	category = -1
	subcategory = 0
	title = Battery type upgrade
	manufacturer = none
	description = none
	mass = 0
	dragModelType = default
	maximum_drag = 0
	minimum_drag = 0
	angularDrag = 0
	crashTolerance = 12
	maxTemp = 1200 // = 3200
	PhysicsSignificance = 0
	bulkheadProfiles = srf
}

//Upgrade:
PARTUPGRADE
{
	name = RB_UpgradeHoCell
	partIcon = RB.HoCell
	techRequired = nuclearPropulsion //exoticNuclearPower
	entryCost = 2400000
	cost = 0 //for display only

	title = #LOC_RB_UpgradeHoCell_Title
	basicInfo = #LOC_RB_descSum_HoCell
	manufacturer = #autoLOC_501635 // Ionic Symphonic Protonic Electronics
	description = #LOC_RB_descDet_HoCell
}

