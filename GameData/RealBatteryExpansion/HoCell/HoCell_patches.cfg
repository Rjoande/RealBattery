// RealBatteryExpansion — HoCell — consolidated @PART patches (Phase 3)
// Adds the HoCell SUBTYPE to every host part that carried it in core.
// Runs in :FOR[RealBatteryExpansion] so the core battery switch + base subtypes already exist.
// HoCell has no inbound EVAupgrade edge and EVAupgrade = none everywhere, so no compat patch.

// ------------------------------------------------------------
// Patch A — uniform hosts (stock + NearFuture + ReStockPlus)
// Battery switch identified by moduleID = batterySwitch.
// Missing parts/mods make the @PART no-op, so one patch covers all.
// ------------------------------------------------------------
@PART[batteryBankMini|batteryBank|batteryBankLarge|probeStackSmall|probeStackLarge|nflv-drone-core-5-1|nflv-drone-core-75-1|battery-rad-125|battery-0625|restock-drone-core-375-1|restock-drone-core-1875-1|restock-drone-core-0625-1|restock-battery-1875-1]:NEEDS[RealBattery]:FOR[RealBatteryExpansion]
{
    @MODULE[ModuleB9PartSwitch]:HAS[#moduleID[batterySwitch]]
    {
        SUBTYPE
        {
            name = HoCell
            title = #LOC_RB_title_HoCell
            descriptionSummary = #LOC_RB_descSum_HoCell
            descriptionDetail = #LOC_RB_descDet_HoCell
            tankType = RB_HoCell
            upgradeRequired = RB_UpgradeHoCell
            defaultSubtypePriority = 1
            MODULE
            {
                IDENTIFIER
                {
                    name = RealBattery
                }
                DATA
                {
                    ChemistryID = HoCell
                    EVAupgrade  = none
                }
            }
        }
    }
}

// ------------------------------------------------------------
// Patch B — OPT generic cockpits (separate; divergent).
// In core's OPT generic patch the Battery subtype is renamed to Li_poly and every
// subtype carries moduleActive, so this HoCell subtype needs moduleActive = true and
// cannot reuse the moduleID/tankType[Battery] matcher. We select OPT parts that core
// already processed (@MODULE[RealBattery]) and the battery switch via its core-added
// NukeCell subtype (stable, never migrated — HoCell shares the nuclear-isotope tier).
// NOTE: verify in-game — OPT wildcard targeting + tankType transformation is the one
// fragile spot flagged in the manifest.
// ------------------------------------------------------------
@PART[h_*,i_*,ij_*,j_*,mk2j_*,jk_*,kh_*,k_*,mk2_nose_opt,opt_*,ab_*,a_*,jl_*,l_*,b2_*,b_*,mk2b_adaptor,wing_1a]:HAS[@MODULE[RealBattery]]:NEEDS[OPT,RealBattery]:FOR[RealBatteryExpansion]
{
    @MODULE[ModuleB9PartSwitch]:HAS[@SUBTYPE[NukeCell]]
    {
        SUBTYPE
        {
            name = HoCell
            title = #LOC_RB_title_HoCell
            descriptionSummary = #LOC_RB_descSum_HoCell
            descriptionDetail = #LOC_RB_descDet_HoCell
            tankType = RB_HoCell
            upgradeRequired = RB_UpgradeHoCell
            defaultSubtypePriority = 1
            MODULE
            {
                IDENTIFIER
                {
                    name = RealBattery
                }
                DATA
                {
                    ChemistryID = HoCell
                    EVAupgrade  = none
                    moduleActive = true
                }
            }
        }
    }
}

// ------------------------------------------------------------
// Decal label subtypes (Blockers A+B) — migrated from core RealBatteryLabel.cfg / -small.cfg.
// Re-added here so core RB_Label / RB_Label_small no longer reference migrated loc keys or the
// RB_UpgradeHoCell PARTUPGRADE. Per-subtype textures live under
// RealBatteryExpansion/HoCell/Assets/decals/ (shared atlas replaced).
// ------------------------------------------------------------
@PART[RB_Label]:NEEDS[RealBattery,ConformalDecals]:FOR[RealBatteryExpansion]
{
    @MODULE[ModuleB9PartSwitch]
    {
        SUBTYPE
        {
            name = variantHoCell
            title = #LOC_RB_title_HoCell
            descriptionDetail = #LOC_RB_descDet_decal_HoCell
            upgradeRequired = RB_UpgradeHoCell
            primaryColor = #1A2B1A
            secondaryColor = #39FF14
            MODULE
            {
                IDENTIFIER { name = ModuleConformalDecal }
                DATA
                {
                    TEXTURE
                    {
                        name = _Decal
                        isMain = false
                        textureUrl = RealBatteryExpansion/HoCell/Assets/decals/decal-HoCell
                    }
                }
            }
        }
        SUBTYPE
        {
            name = variantHoCell_toasted
            title = #LOC_RB_title_HoCell_toasted
