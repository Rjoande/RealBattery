	{
        #LOC_RB_title_HoCell = Metastable Holmium
        #LOC_RB_short_HoCell = Ho-166m
        #LOC_RB_descSum_HoCell = <b>C-rate:</b> 0.05C\n<b>Thermal loss:</b> 6% (max temp: 1800 K)\n<b>Half-life:</b> ~1,200 years\n<#FF0000>Non-rechargeable</color>
        #LOC_RB_descDet_HoCell = The hafnium's interstellar-grade cousin. Ho-166m stores energy in an exceptionally long-lived nuclear isomer, retaining ~84% output after 300 years of flight. Power output can be modulated via Radiation-Induced Pulse (R.I.P.) stimulation, unlike a conventional RTG. The spontaneous runaway probability is lower than Hf, but it's never truly zero. Handle accordingly.\n<#FF0000>Low but non-zero probability of spontaneous runaway.</color>\n<#FF0000>Not EVA-serviceable.</color>
        #LOC_RB_title_HoCell_toasted = Holmium (toasted)
        #LOC_RB_short_HoCell_classified = Ho-####
        #LOC_RB_short_vint_HoCell = Ho-166m (vintage)
        #LOC_RB_short_vint_HoCell_classified = Ho-#### (vintage)
