	it-it
	{
        #LOC_RB_title_HoCell = Olmio metastabile
        #LOC_RB_short_HoCell = Ho-166m
        #LOC_RB_descSum_HoCell = <b>Indice di carica:</b> 0.05C\n<b>Disp. termica:</b> 6% (T° max: 1800 K)\n<b>Emivita:</b> ~1,200 anni\n<#FF0000>Non ricaricabile</color>
