        #LOC_RB_descDet_HoCell = Le cousin interstellaire de l'hafnium. Ho-166m stocke l'énergie dans un isomère nucléaire à durée de vie exceptionnellement longue, conservant environ 84 % de sa puissance après 300 ans de vol. La puissance peut être modulée par Rayonnement-Induit Pulsé (R.I.P.), contrairement à un RTG conventionnel. La probabilité d'auto-emballement thermique spontané est inférieure à celle de l'hafnium, mais n'est jamais vraiment nulle. Manipuler en conséquence.\n<#FF0000>Probabilité faible mais non nulle d'auto-emballement spontané.</color>\n<#FF0000>Ne peut pas être remplacée en EVA.</color>
        #LOC_RB_title_HoCell_toasted = Holmium (brûlée)
        #LOC_RB_short_HoCell_classified = Ho-####
        #LOC_RB_short_vint_HoCell = Ho-166m (vintage)
        #LOC_RB_short_vint_HoCell_classified = Ho-#### (vintage)
