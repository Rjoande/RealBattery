        #LOC_RB_descDet_decal_HoCell_classified = - <b>[####SUPRIMIDO####]:</b> [SUPRIMIDO] años. Se ruega a los nietos de los nietos que tramiten la documentación.\n- <b>NO RECARGABLE,</b> no reembolsable, y no se puede apresurar.\n- <b>[######SUPRIMIDO######]:</b> estadísticamente improbable por siglo. Las estadísticas no son una garantía.\n- «Larga duración» es un eufemismo.
        #LOC_RB_descSum_decal-small_HoCell = ¡Dura 1.200 años! (o hasta la fuga térmica)
        #LOC_RB_descSum_decal-small_HoCell_classified = ¡Dura [SUPRIMIDO] años! [###SUPRIMIDO###]
        #LOC_RB_UpgradeHoCell_Title = Células isotópicas de larga vida
