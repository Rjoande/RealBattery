        #LOC_RB_title_HoCell = 亚稳态钬
        #LOC_RB_short_HoCell = Ho-166m
        #LOC_RB_descSum_HoCell = C 倍率：0.05C\n热损：6%（最高温度：1800 K）\n半衰期：~1,200 年\n<#FF0000>不可充电</color>
        #LOC_RB_descDet_HoCell = Hf-178m2 的星际级表亲。Ho-166m 将能量存储于寿命极长的核同质异能素中，经 300 年飞行后仍可保留约 84% 的输出。与传统 RTG 不同，可通过辐射诱发脉冲（R.I.P.）调制功率输出。自发失控概率低于铪，但永远不是真正的零。请谨慎处置。\n<#FF0000>存在低但非零的自发失控概率。</color>\n<#FF0000>不可进行 EVA 维护。</color>
