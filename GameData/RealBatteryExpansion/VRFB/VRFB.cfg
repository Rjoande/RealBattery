// RealBatteryExpansion — VRFB — definitions
// Migrated from core RealBattery (Phase 2). Self-contained:
//   REALBATTERY_CHEMISTRY (from settings/Chemistries.cfg)
//   B9_TANK_TYPE          (from settings/B9TankTypes.cfg)
//   dummy icon PART       (from settings/upgrades_subtypes.cfg) — asset path repointed to Assets/
//   PARTUPGRADE + CTT override (from settings/upgrades_subtypes.cfg)

// ============================================================
//  VANADIUM REDOX FLOW BATTERY  (VRFB)
//  Late-game stationary / large-vessel storage.
//  No special code logic required.
// ============================================================
REALBATTERY_CHEMISTRY
{
    ChemistryID = VRFB
    displayName = #LOC_RB_short_VRFB
    title = #LOC_RB_title_VRFB
    descriptionSummary = #LOC_RB_descSum_VRFB
    descriptionDetail = #LOC_RB_descDet_VRFB

    HighEClevel = 0.95
    LowEClevel  = 0.90
    Crate       = 0.10     // slow charge/discharge by design
	CrateScale  = add

    CycleDurability     = 40000        // effectively unlimited cycle life
    SelfDischargeRate   = 0.00001      // negligible self-discharge (electrolyte tanks can be isolated)
    EvaRefurbishEnabled = true
    EVAminLevel         = 4
    SparePartsPerKWh    = 13

    ThermalLoss         = 0.02
    TempOptimal         = 350
    TempOverheat        = 380
    TempRunaway         = 99999
    RunawayHeatFactor   = 0

    FixedOutput         = false
    BatteryStaged       = false
    KeepWarmMode        = false
    TempKeepWarmLo      = 500
    TempKeepWarmHi      = 600
    SelfRunaway         = false
    RunawayBaseChance   = 0.0
    LifeDecay           = false
    InfiniteCycles      = false

    ChargeEfficiencyCurve
    {
        key = 0.0 0.70
        key = 0.5 0.85
        key = 1.0 0.70
    }
}

B9_TANK_TYPE
{
	name = RB_VRFB
    primaryColor = #1A6B9E
    secondaryColor = #6DB8D4
	tankMass = 0.0025
	tankCost = 2

	RESOURCE
	{
		name = ElectricCharge
		unitsPerVolume = 0.06
	}

	RESOURCE
	{
		name = StoredCharge
		unitsPerVolume = 0.04
	}
}

//Dummy part for icon:
PART
{
	name = RB_VRFB
	module = Part
	author = Rjoande
	MODEL
	{
		model = RealBatteryExpansion/VRFB/Assets/PartUpgrade/model
	}
	rescaleFactor = 1
	attachRules = 0,0,0,0,0
	TechRequired = HIDDEN
	TechHidden = true
	entryCost = 0
	cost = 0
	category = -1
	subcategory = 0
	title = Battery type upgrade
	manufacturer = none
	description = none
	mass = 0
	dragModelType = default
	maximum_drag = 0
	minimum_drag = 0
	angularDrag = 0
	crashTolerance = 12
	maxTemp = 1200 // = 3200
	PhysicsSignificance = 0
	bulkheadProfiles = srf
}

//Upgrade:
PARTUPGRADE
{
	name = RB_UpgradeVRFB
	partIcon = RB.VRFB
	techRequired = specializedElectrics //highTechElectricalSystems
	entryCost = 180000
	cost = 0 //for display only

	title = #LOC_RB_UpgradeVRFB_Title
	basicInfo = #LOC_RB_descSum_VRFB
	manufacturer = #autoLOC_501636 // Zaltonic Electronics
	description = #LOC_RB_descDet_VRFB
}

@PARTUPGRADE[RB_UpgradeVRFB]:NEEDS[CommunityTechTree]
{
	@techRequired = highTechElectricalSystems
}
