// RealBatteryExpansion — VRFB — consolidated @PART patch (Phase 3)
// Adds the VRFB SUBTYPE to every host part that carried it in core.
// VRFB is TERMINAL: EVAupgrade = none everywhere. The two former VRFB->SMES edges
// (core RB_Stock_Batteries + ReStockPlus_Batteries) were a bug and are dropped here,
// so SMES is reached only by direct B9PS purchase. No compat patch needed.
// Runs in :FOR[RealBatteryExpansion] so the core battery switch already exists.
// Missing parts/mods make the @PART no-op, so one patch covers stock + NF + ReStock.

@PART[batteryPack|ksp_r_largeBatteryPack|batteryBank|batteryBankLarge|mk3Cockpit_Shuttle|cupola|HECS2_ProbeCore|M3X_ShovelCockpit|M3X_InlineCockpit|M3X_CyclopsCockpit|nfex-probe-chfr-1|nfex-probe-cyl-1|nfex-probe-plto-1|nfex-probe-sqr-1|battery-rad-125|battery-0625|battery-125|battery-25|restock-battery-1875-1]:NEEDS[RealBattery]:FOR[RealBatteryExpansion]
{
    @MODULE[ModuleB9PartSwitch]:HAS[#moduleID[batterySwitch]]
    {
        SUBTYPE
        {
            name = VRFB
            title = #LOC_RB_title_VRFB
            descriptionSummary = #LOC_RB_descSum_VRFB
            descriptionDetail = #LOC_RB_descDet_VRFB
            tankType = RB_VRFB
            upgradeRequired = RB_UpgradeVRFB
            defaultSubtypePriority = 8
            MODULE
            {
                IDENTIFIER
                {
                    name = RealBattery
                }
                DATA
                {
                    ChemistryID = VRFB
                    EVAupgrade  = none
                }
            }
        }
    }
}

// ------------------------------------------------------------
// Decal label subtypes (Blockers A+B) — migrated from core RealBatteryLabel.cfg / -small.cfg.
// Per-subtype textures live under RealBatteryExpansion/VRFB/Assets/decals/ (shared atlas replaced).
// ------------------------------------------------------------
@PART[RB_Label]:NEEDS[RealBattery,ConformalDecals]:FOR[RealBatteryExpansion]
{
    @MODULE[ModuleB9PartSwitch]
    {
        SUBTYPE
        {
            name = variantVRFB
            title = #LOC_RB_title_VRFB
            descriptionDetail = #LOC_RB_descDet_decal_VRFB
            upgradeRequired = RB_UpgradeVRFB
            primaryColor = #1A6B9E
            secondaryColor = #6DB8D4
            MODULE
            {
                IDENTIFIER { name = ModuleConformalDecal }
                DATA
                {
                    TEXTURE
                    {
                        name = _Decal
                        isMain = false
                        textureUrl = RealBatteryExpansion/VRFB/Assets/decals/decal-VRFB
                    }
                }
            }
        }
        SUBTYPE
        {
            name = variantVRFB_toasted
            title = #LOC_RB_title_VRFB_toasted
            descriptionDetail = #LOC_RB_descDet_decal_VRFB
            upgradeRequired = RB_UpgradeVRFB
            primaryColor = #1A6B9E
            secondaryColor = #F7F3EB
