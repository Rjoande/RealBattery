// RealBatteryExpansion — QET — localization
Localization
{
	en-us
	{
        #LOC_RB_title_QET = Quantum Cells
        #LOC_RB_short_QET = QET
        #LOC_RB_descSum_QET = <b>C-rate:</b> 10C (additive)\n<b>Thermal loss:</b> 0.1% (max temp: 400 K)\n<b>Self-discharge:</b> 0%\n<b>Durability:</b> 2,000 cycles
        #LOC_RB_descDet_QET = Discovered when R&D noticed their quantum processor could hold a charge — and hand it to another, no wire needed. One report said "teleportation" and got quietly filed away. Wire more together, and the whole bank charges at once.\n<#4DC2FF>Requires active cryogenic cooling.</color>\n<#FF0000>Not EVA-serviceable.</color>
        #LOC_RB_title_QET_toasted = Quantum Cells (toasted)
        #LOC_RB_short_vint_QET = QET (vintage)
        #LOC_RB_descDet_decal_QET = - <b>CRYOGENIC SYSTEM:</b> do not touch, breathe near, or store snacks inside.\n- <b>ENTANGLEMENT IN PROGRESS:</b> the qubits inside are shy and would rather not be observed during operation.\n- <b>THIS IS NOT A TRANSPORTER PAD.</b> Do not attempt to beam yourself, pets, or lunch through it: there is no transporter chief on duty.
        #LOC_RB_descSum_decal-small_QET = No cables. No clue how. No asking.
        #LOC_RB_UpgradeQET_Title = Quantum Teleportation Cells
        #LOC_RB_Tip_QET_01 = Entangling qubits...
        #LOC_RB_Tip_QET_02 = Teleporting quanta...
	}
	it-it
	{
        #LOC_RB_title_QET = Celle Quantistiche
        #LOC_RB_short_QET = QET
        #LOC_RB_descSum_QET = <b>Indice di carica:</b> 10C (additivo)\n<b>Disp. termica:</b> 0.1% (T° max: 400 K)\n<b>Autoscarica:</b> 0%\n<b>Vita utile:</b> 2,000 cicli
        #LOC_RB_descDet_QET = Scoperta quasi per caso quando i tecnici di R&S hanno notato che il loro processore quantistico riusciva a trattenere una carica e trasferirla a un altro, senza fili. Nel rapporto hanno scritto "teletrasporto" prima che venisse tutto archiviato. Più unità si collegano, più velocemente si caricano.\n<#4DC2FF>Richiede raffreddamento criogenico attivo.</color>\n<#FF0000>Non può essere sostituita in EVA.</color>
        #LOC_RB_title_QET_toasted = Celle Quantistiche (bruciate)
        #LOC_RB_short_vint_QET = QET (vintage)
        #LOC_RB_descDet_decal_QET = - <b>SISTEMA CRIOGENICO:</b> non toccare, non respirarci vicino, non riporre snack all'interno.\n- <b>ENTANGLEMENT IN CORSO:</b> i qubit all'interno sono timidi e preferirebbero non essere osservati durante il funzionamento.\n- <b>QUESTA NON È UNA PIATTAFORMA DI TELETRASPORTO.</b> Non tentare di teletrasportare te stesso, animali domestici o il pranzo: non c'è nessun addetto al teletrasporto in servizio.
        #LOC_RB_descSum_decal-small_QET = Niente cavi. Nessuna idea del perché. Niente domande.
        #LOC_RB_UpgradeQET_Title = Celle a Teletrasporto Quantistico
        #LOC_RB_Tip_QET_01 = Intreccio i qubit...
        #LOC_RB_Tip_QET_02 = Teletrasporto i quanti...
	}
	es-es
	{
        #LOC_RB_title_QET = Células Cuánticas
        #LOC_RB_short_QET = QET
        #LOC_RB_descSum_QET = <b>C-rate:</b> 10C (aditivo)\n<b>Pérdida térmica:</b> 0.1% (T° máx: 400 K)\n<b>Autodescarga:</b> 0%\n<b>Durabilidad:</b> 2,000 ciclos
        #LOC_RB_descDet_QET = Descubierta cuando el personal de I+D notó que su procesador cuántico podía retener carga — y transferirla a otro sin cable alguno. Un informe usó la palabra «teletransporte» y fue archivado en silencio. Cuantas más unidades se conectan, más rápido carga todo el banco a la vez.\n<#4DC2FF>Requiere refrigeración criogénica activa.</color>\n<#FF0000>No apta para mantenimiento en EVA.</color>
        #LOC_RB_title_QET_toasted = Células Cuánticas (quemadas)
        #LOC_RB_short_vint_QET = QET (vintage)
        #LOC_RB_descDet_decal_QET = - <b>SISTEMA CRIOGÉNICO:</b> no tocar, no respirar cerca, no guardar tentempiés en su interior.\n- <b>ENTRELAZAMIENTO EN CURSO:</b> los cúbits del interior son tímidos y preferirían no ser observados durante el funcionamiento.\n- <b>ESTO NO ES UNA PLATAFORMA DE TELETRANSPORTE.</b> No intentes teletransportarte a ti mismo, a tus mascotas ni el almuerzo a través de ella: no hay ningún jefe de teletransporte de guardia.
        #LOC_RB_descSum_decal-small_QET = Sin cables. Sin idea de cómo. Sin preguntas.
        #LOC_RB_UpgradeQET_Title = Células de Teletransporte Cuántico
        #LOC_RB_Tip_QET_01 = Entrelazando cúbits...
        #LOC_RB_Tip_QET_02 = Teletransportando cuantos...
	}
	fr-fr
	{
        #LOC_RB_title_QET = Cellules quantiques
        #LOC_RB_short_QET = QET
        #LOC_RB_descSum_QET = <b>Taux de décharge :</b> 10C (additif)\n<b>Perte thermique :</b> 0,1 % (T° max : 400 K)\n<b>Autodécharge :</b> 0 %\nDurée de vie : 2 000 cycles
        #LOC_RB_descDet_QET = Découverte quand le service R&D a remarqué que leur processeur quantique pouvait retenir une charge — et la transmettre à un autre, sans aucun câble. Un rapport a utilisé le mot « téléportation » et a été discrètement classé. Plus on connecte d'unités, plus vite l'ensemble se charge d'un coup.\n<#4DC2FF>Nécessite un refroidissement cryogénique actif.</color>\n<#FF0000>Ne peut pas être remplacée en EVA.</color>
        #LOC_RB_title_QET_toasted = Cellules quantiques (brûlées)
        #LOC_RB_short_vint_QET = QET (vintage)
        #LOC_RB_descDet_decal_QET = - <b>SYSTÈME CRYOGÉNIQUE :</b> ne pas toucher, ne pas respirer à proximité, ne pas stocker des encas à l'intérieur.\n- <b>INTRICATION EN COURS :</b> les qubits à l'intérieur sont timides et préféreraient ne pas être observés pendant le fonctionnement.\n- <b>CECI N'EST PAS UNE PLATEFORME DE TÉLÉPORTATION.</b> N'essayez pas de vous téléporter, ni vos animaux, ni votre déjeuner à travers elle : aucun chef téléporteur n'est de service.
        #LOC_RB_descSum_decal-small_QET = Aucun câble. Aucune idée du comment. Aucune question.
        #LOC_RB_UpgradeQET_Title = Cellules à téléportation quantique
        #LOC_RB_Tip_QET_01 = Intrication des qubits...
        #LOC_RB_Tip_QET_02 = Téléportation des quanta...
	}
	zh-cn
	{
        #LOC_RB_title_QET = 量子电芯
        #LOC_RB_short_QET = 量子传能
        #LOC_RB_descSum_QET = C 倍率：10C（叠加）\n热损：0.1%（最高温度：400 K）\n自放电：0%\n寿命：2,000 次循环
        #LOC_RB_descDet_QET = 研发部门的人偶然发现，他们的量子处理器不仅能存储电荷，还能不通过任何导线把电荷交给另一台。有一份报告用了"传送"这个词，随后被悄悄归档。接入的单元越多，整组电芯就充得越快、越同步。\n<#4DC2FF>需要主动低温冷却。</color>\n<#FF0000>不可进行 EVA 维护。</color>
        #LOC_RB_title_QET_toasted = 量子电芯（烤糊）
        #LOC_RB_short_vint_QET = 量子传能（经典）
        #LOC_RB_descDet_decal_QET = - <b>低温系统：</b>请勿触摸、在旁呼吸或在内存放零食。\n- <b>纠缠进行中：</b>里面的量子比特很害羞，运行期间不太愿意被观测。\n- <b>这不是传送台。</b>请勿尝试把自己、宠物或午餐传送过去：当班没有传送室主管。
        #LOC_RB_descSum_decal-small_QET = 没有导线。不知原理。不许多问。
        #LOC_RB_UpgradeQET_Title = 量子传送电芯
        #LOC_RB_Tip_QET_01 = 正在纠缠量子比特…
        #LOC_RB_Tip_QET_02 = 正在传送量子…
	}
}
