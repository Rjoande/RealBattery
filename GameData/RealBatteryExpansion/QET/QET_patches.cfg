// RealBatteryExpansion — QET — consolidated @PART patch
// Adds the QET SUBTYPE to the small/medium-small battery parts, complementary to
// SMES (which occupies the medium/large stack packs). Part pool is limited to the
// core battery patches: RB_Stock_Batteries, NearFuture_Batteries, ReStockPlus_Batteries.
// QET is TERMINAL: EVAupgrade = none, reached by direct B9PS purchase only.
// Runs in :FOR[RealBatteryExpansion] so the core battery switch already exists.
// Parts that don't exist (mod not installed) are silently skipped by ModuleManager.

@PART[batteryPack|batteryBankMini|ksp_r_largeBatteryPack|battery-rad-125|battery-0625|battery-125|nfex-battery-mini-1]:NEEDS[RealBattery]:FOR[RealBatteryExpansion]
{
    @MODULE[ModuleB9PartSwitch]:HAS[#moduleID[batterySwitch]]
    {
        SUBTYPE
        {
            name = QET
            title = #LOC_RB_title_QET
            descriptionSummary = #LOC_RB_descSum_QET
            descriptionDetail = #LOC_RB_descDet_QET
            tankType = RB_QET
            upgradeRequired = RB_UpgradeQET
            defaultSubtypePriority = 1
            MODULE
            {
                IDENTIFIER
                {
                    name = RealBattery
                }
                DATA
                {
                    ChemistryID = QET
                    EVAupgrade  = none
                }
            }
        }
    }
}

// ------------------------------------------------------------
// Decal label subtypes (Blockers A+B) — migrated from core RealBatteryLabel.cfg / -small.cfg.
// Per-subtype textures live under RealBatteryExpansion/QET/Assets/decals/ (shared atlas replaced).
// ------------------------------------------------------------
@PART[RB_Label]:NEEDS[RealBattery,ConformalDecals]:FOR[RealBatteryExpansion]
{
    @MODULE[ModuleB9PartSwitch]
    {
        SUBTYPE
        {
            name = variantQET
            title = #LOC_RB_title_QET
            descriptionDetail = #LOC_RB_descDet_decal_QET
            upgradeRequired = RB_UpgradeQET
            primaryColor = #150029
            secondaryColor = #ffffff
            MODULE
            {
                IDENTIFIER { name = ModuleConformalDecal }
                DATA
                {
                    TEXTURE
                    {
                        name = _Decal
                        isMain = false
                        textureUrl = RealBatteryExpansion/QET/Assets/decals/decal-QET
                    }
                }
            }
        }
        SUBTYPE
        {
            name = variantQET_toasted
            title = #LOC_RB_title_QET_toasted
            descriptionDetail = #LOC_RB_descDet_decal_QET
            upgradeRequired = RB_UpgradeQET
            primaryColor = #150029
            secondaryColor = #F7F3EB
            MODULE
            {
                IDENTIFIER { name = ModuleConformalDecal }
                DATA
                {
                    TEXTURE
                    {
                        name = _Decal
                        isMain = false
                        textureUrl = RealBatteryExpansion/QET/Assets/decals/decal-QET_toasted
                    }
                }
            }
        }
    }
}

