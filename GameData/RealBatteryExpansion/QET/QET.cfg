// RealBatteryExpansion — QET — definitions

// ============================================================
//  QUANTUM ENERGY TELEPORTATION (QET)
//  Cryo upkeep: cooling required to maintain quantum coherence.
//  C-rate is additive across linked cells (CrateScale = add).
// ============================================================
REALBATTERY_CHEMISTRY
{
    ChemistryID = QET
    displayName = #LOC_RB_short_QET
    title = #LOC_RB_title_QET
    descriptionSummary = #LOC_RB_descSum_QET
    descriptionDetail = #LOC_RB_descDet_QET

    HighEClevel = 0.95
    LowEClevel  = 0.90
    Crate       = 10              // high instantaneous power
	CrateScale  = add

    CycleDurability     = 2000
    SelfDischargeRate   = 0
    EvaRefurbishEnabled = false
    EVAminLevel         = 5
    SparePartsPerKWh    = 370

    ThermalLoss         = 0.001
    TempOptimal         = 300     // LqdHydrogen target in SH/CryoTanks
    TempOverheat        = 400     // LqdMethane target in SH/CryoTanks
    TempRunaway         = 410     // very high threshold for loss of quantum coherence
    RunawayHeatFactor   = 0

    FixedOutput         = false
    BatteryStaged       = false
    KeepWarmMode        = cryo    // upkeep required to STAY COLD
    TempKeepWarmLo      = 320     // below this: no upkeep needed
    TempKeepWarmHi      = 370     // above this: full cooling upkeep required
    SelfRunaway         = false
    RunawayBaseChance   = 0.0
    LifeDecay           = false
    InfiniteCycles      = false

    ChargeEfficiencyCurve
    {
        key = 0.0 0.97
        key = 1.0 0.97
    }
}

B9_TANK_TYPE
{
	name = RB_QET
    primaryColor = #150029
    secondaryColor = #c724ff
	tankMass = 0.0015
	tankCost = 16

	RESOURCE
	{
		name = ElectricCharge
		unitsPerVolume = 8.00
	}

	RESOURCE
	{
		name = StoredCharge
		unitsPerVolume = 0.02
	}
}

