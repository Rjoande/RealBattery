// RealBatteryExpansion — SMES — localization (Phase 4)
// Migrated verbatim from core RealBattery/localization/<lang>.cfg (9 keys x 5 languages).
Localization
{
	en-us
	{
        #LOC_RB_title_SMES = Superconductors
        #LOC_RB_short_SMES = SMES
        #LOC_RB_descSum_SMES = <b>C-rate:</b> 30C\n<b>Thermal loss:</b> 3% (max temp: 400 K)\n<b>Self-discharge:</b> 0%\n<b>Durability:</b> infinite
        #LOC_RB_descDet_SMES = Energy stored in a persistent superconducting magnetic field. Instantaneous power delivery, infinite cycles and zero negligible, as long as you keep the coil below 100 K. Above that, superconductivity collapses and the stored energy... goes somewhere. Quickly.\n<#4DC2FF>Requires active cryogenic cooling.</color>\n<#FF0000>Not EVA-serviceable.</color>
        #LOC_RB_title_SMES_toasted = Superconductors (toasted)
        #LOC_RB_short_vint_SMES = SMES (vintage)
        #LOC_RB_descDet_decal_SMES = - <b>CRYOGENIC SYSTEM:</b> do not touch, breathe near, or store snacks inside.\n- <b>QUENCH EVENTS ARE NOT SCHEDULED MAINTENANCE.</b> Evacuate the bay.\n- <b>MAGNETIC FIELD IN OPERATION:</b> keep pacemakers, ferromagnetic tools, and ambitions at a safe distance.\n- Infinite cycle life. The cooling bill is also effectively infinite.
        #LOC_RB_descSum_decal-small_SMES = Infinite cycle life. Keep below 100 K. Do not quench.
        #LOC_RB_UpgradeSMES_Title = Superconducting Magnetic Cells
        #LOC_RB_Tip_SMES = Supercooling coils...
	}
	it-it
	{
        #LOC_RB_title_SMES = Superconduttori
        #LOC_RB_short_SMES = SMES
        #LOC_RB_descSum_SMES = <b>Indice di carica:</b> 30C\n<b>Disp. termica:</b> 3% (T° max: 400 K)\n<b>Autoscarica:</b> 0%\n<b>Vita utile:</b> infinita
        #LOC_RB_descDet_SMES = Energia immagazzinata in un campo magnetico superconduttore persistente. Erogazione istantanea, cicli infiniti e autoscarica trascurabile, finché la bobina rimane sotto i 100 K. Superata questa soglia, la superconduttività collassa e l'energia immagazzinata... va da qualche parte. Rapidamente.\n<#4DC2FF>Richiede raffreddamento criogenico attivo.</color>\n<#FF0000>Non può essere sostituita in EVA.</color>
        #LOC_RB_title_SMES_toasted = Superconduttori (bruciata)
        #LOC_RB_short_vint_SMES = SMES (vintage)
        #LOC_RB_descDet_decal_SMES = - <b>SISTEMA CRIOGENICO:</b> non toccare, non respirarci vicino, non riporre snack all'interno.\n- <b>GLI EVENTI DI QUENCH NON SONO MANUTENZIONE PROGRAMMATA.</b> Evacuare il comparto.\n- <b>CAMPO MAGNETICO IN FUNZIONE:</b> tenere pacemaker, utensili ferromagnetici e ambizioni a distanza di sicurezza.\n- Vita ciclica infinita. Anche le lamentele dei contabili.
        #LOC_RB_descSum_decal-small_SMES = Vita ciclica infinita. Mantenere sotto i 100 K. Non quenchare.
        #LOC_RB_UpgradeSMES_Title = Celle magnetiche superconduttrici
        #LOC_RB_Tip_SMES = Raffreddo le bobine...
	}
	es-es
	{
        #LOC_RB_title_SMES = Superconductores
        #LOC_RB_short_SMES = SMES
        #LOC_RB_descSum_SMES = <b>C-rate:</b> 30C\n<b>Pérdida térmica:</b> 3% (T° máx: 400 K)\n<b>Autodescarga:</b> 0%\n<b>Durabilidad:</b> infinita
        #LOC_RB_descDet_SMES = Energía almacenada en un campo magnético superconductor persistente. Entrega instantánea de potencia, ciclos infinitos y autodescarga despreciable, siempre que la bobina se mantenga por debajo de los 100 K. Por encima de esa temperatura, la superconductividad colapsa y la energía almacenada... va a algún lugar. Rápidamente.\n<#4DC2FF>Requiere refrigeración criogénica activa.</color>\n<#FF0000>No apta para mantenimiento en EVA.</color>
        #LOC_RB_title_SMES_toasted = Superconductores (quemada)
        #LOC_RB_short_vint_SMES = SMES (vintage)
        #LOC_RB_descDet_decal_SMES = - <b>SISTEMA CRIOGÉNICO:</b> no tocar, no respirar cerca, no guardar tentempiés en su interior.\n- <b>LOS EVENTOS DE QUENCH NO SON MANTENIMIENTO PROGRAMADO.</b> Evacuar el compartimento.\n- <b>CAMPO MAGNÉTICO EN OPERACIÓN:</b> mantener marcapasos, herramientas ferromagnéticas y ambiciones a distancia segura.\n- Vida útil en ciclos infinita. La factura del enfriamiento, también.
        #LOC_RB_descSum_decal-small_SMES = Vida útil en ciclos infinita. Mantener por debajo de 100 K. No provocar quench.
        #LOC_RB_UpgradeSMES_Title = Células magnéticas superconductoras
        #LOC_RB_Tip_SMES = Superenfriando bobinas...
	}
	fr-fr
	{
        #LOC_RB_title_SMES = Supraconducteurs
        #LOC_RB_short_SMES = SMES
        #LOC_RB_descSum_SMES = <b>Taux de décharge :</b> 30C\n<b>Perte thermique :</b> 3 % (T° max : 400 K)\n<b>Autodécharge :</b> 0 %\nDurée de vie : infinie
        #LOC_RB_descDet_SMES = Énergie stockée dans un champ magnétique supraconducteur persistant. Fourniture instantanée de puissance, cycles infinis et autodécharge négligeable, tant que la bobine reste en dessous de 100 K. Au-delà, la supraconductivité s'effondre et l'énergie stockée... va quelque part. Rapidement.\n<#4DC2FF>Nécessite un refroidissement cryogénique actif.</color>\n<#FF0000>Ne peut pas être remplacée en EVA.</color>
        #LOC_RB_title_SMES_toasted = Supraconducteurs (brûlée)
        #LOC_RB_short_vint_SMES = SMES (vintage)
        #LOC_RB_descDet_decal_SMES = - <b>SYSTÈME CRYOGÉNIQUE :</b> ne pas toucher, ne pas respirer à proximité, ne pas stocker des encas à l'intérieur.\n- <b>LES ÉVÉNEMENTS DE QUENCH NE SONT PAS UNE MAINTENANCE PROGRAMMÉE.</b> Évacuer le compartiment.\n- <b>CHAMP MAGNÉTIQUE EN FONCTIONNEMENT :</b> maintenir les stimulateurs cardiaques, outils ferromagnétiques et ambitions à distance de sécurité.\n- Durée de vie en cycles infinie. La facture de refroidissement aussi, en pratique.
        #LOC_RB_descSum_decal-small_SMES = Durée de vie en cycles infinie. Maintenir en dessous de 100 K. Ne pas provoquer de quench.
        #LOC_RB_UpgradeSMES_Title = Cellules magnétiques supraconductrices
        #LOC_RB_Tip_SMES = Refroidissement des bobines...
	}
	zh-cn
	{
        #LOC_RB_title_SMES = 超导体
        #LOC_RB_short_SMES = 超导储能
        #LOC_RB_descSum_SMES = C 倍率：30C\n热损：3%（最高温度：400 K）\n自放电：0%\n寿命：无限
        #LOC_RB_descDet_SMES = 能量储存于持续超导磁场中。瞬时功率输出，无限循环，自放电可忽略不计——只要线圈温度保持在 100 K 以下。超过此温度，超导性崩溃，储存的能量……会去某个地方。很快。\n<#4DC2FF>需要主动低温冷却。</color>\n<#FF0000>不可进行 EVA 维护。</color>
        #LOC_RB_title_SMES_toasted = 超导体（烤糊）
        #LOC_RB_short_vint_SMES = 超导储能（经典）
        #LOC_RB_descDet_decal_SMES = - <b>低温系统：</b>请勿触摸、在旁呼吸或在内存放零食。\n- <b>失超事件不属于计划内维护。</b>请撤离舱段。\n- <b>运行中存在磁场：</b>请将心脏起搏器、铁磁工具及雄心壮志保持安全距离。\n- 无限循环寿命。冷却费用同样近乎无限。
        #LOC_RB_descSum_decal-small_SMES = 无限循环寿命。保持 100 K 以下。切勿失超。
        #LOC_RB_UpgradeSMES_Title = 超导磁能电芯
        #LOC_RB_Tip_SMES = 正在超冷却线圈…
	}
}
