// RealBatteryExpansion — SMES — definitions
// Migrated from core RealBattery (Phase 2). Self-contained:
//   REALBATTERY_CHEMISTRY (from settings/Chemistries.cfg)
//   B9_TANK_TYPE          (from settings/B9TankTypes.cfg)
//   dummy icon PART       (from settings/upgrades_subtypes.cfg) — asset path repointed to Assets/
//   PARTUPGRADE + CTT override (from settings/upgrades_subtypes.cfg)

// ============================================================
//  SUPERCONDUCTING MAGNETIC ENERGY STORAGE  (SMES)
//  Cryo upkeep: cooling required to maintain superconductivity.
//  No cycle wear (magnetic storage, no electrochemical degradation).
// ============================================================
REALBATTERY_CHEMISTRY
{
    ChemistryID = SMES
    displayName = #LOC_RB_short_SMES
    title = #LOC_RB_title_SMES
    descriptionSummary = #LOC_RB_descSum_SMES
    descriptionDetail = #LOC_RB_descDet_SMES

    HighEClevel = 0.95
    LowEClevel  = 0.90
    Crate       = 30              // very high instantaneous power

    CycleDurability     = 1       // placeholder; InfiniteCycles = true overrides wear
    SelfDischargeRate   = 0
    EvaRefurbishEnabled = false
    EVAminLevel         = 5
    SparePartsPerKWh    = 370

    ThermalLoss         = 0.003
    TempOptimal         = 300     // LqdHydrogen target in SH/CryoTanks
    TempOverheat        = 400     // LqdMethane target in SH/CryoTanks
    TempRunaway         = 410     // very thigh threshold for loss of superconductivity
    RunawayHeatFactor   = 0

    FixedOutput         = false
    BatteryStaged       = false
    KeepWarmMode        = cryo    // upkeep required to STAY COLD
    TempKeepWarmLo      = 320     // below this: no upkeep needed
    TempKeepWarmHi      = 370     // above this: full cooling upkeep required
    SelfRunaway         = false
    RunawayBaseChance   = 0.0
    LifeDecay           = false
    InfiniteCycles      = true    // superconducting coil does not degrade

    ChargeEfficiencyCurve
    {
        key = 0.0 0.90
        key = 1.0 0.95
    }
}

B9_TANK_TYPE
{
	name = RB_SMES
    primaryColor = #0D2B3E
    secondaryColor = #00E5FF
	tankMass = 0.001
	tankCost = 15

	RESOURCE
	{
		name = ElectricCharge
		unitsPerVolume = 6.00
	}

	RESOURCE
	{
		name = StoredCharge
		unitsPerVolume = 0.02
	}
}

//Dummy part for icon:
PART
{
	name = RB_SMES
	module = Part
	author = Rjoande
	MODEL
	{
		model = RealBatteryExpansion/SMES/Assets/PartUpgrade/model
	}
	rescaleFactor = 1
	attachRules = 0,0,0,0,0
	TechRequired = HIDDEN
	TechHidden = true
	entryCost = 0
	cost = 0
	category = -1
	subcategory = 0
	title = Battery type upgrade
	manufacturer = none
	description = none
	mass = 0
	dragModelType = default
	maximum_drag = 0
	minimum_drag = 0
	angularDrag = 0
	crashTolerance = 12
	maxTemp = 1200 // = 3200
	PhysicsSignificance = 0
	bulkheadProfiles = srf
}

//Upgrade:
PARTUPGRADE
{
	name = RB_UpgradeSMES
	partIcon = RB.SMES
	techRequired = experimentalElectrics //exoticElectricalSystems
	entryCost = 480000
	cost = 0 //for display only

	title = #LOC_RB_UpgradeSMES_Title
	basicInfo = #LOC_RB_descSum_SMES
	manufacturer = #autoLOC_501635 // Ionic Symphonic Protonic Electronics
	description = #LOC_RB_descDet_SMES
}

@PARTUPGRADE[RB_UpgradeSMES]:NEEDS[CommunityTechTree]
{
	@techRequired = exoticElectricalSystems
}
