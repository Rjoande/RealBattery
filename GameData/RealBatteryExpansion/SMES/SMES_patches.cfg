// RealBatteryExpansion — SMES — consolidated @PART patch (Phase 3)
// Adds the SMES SUBTYPE to every host part that carried it in core.
// SMES is TERMINAL: EVAupgrade = none, reached by direct B9PS purchase only
// (the former VRFB->SMES edge was a bug, dropped in VRFB_patches.cfg). No compat patch.
// Runs in :FOR[RealBatteryExpansion] so the core battery switch already exists.

@PART[batteryBank|batteryBankLarge|nflv-battery-stack-5-1|nflv-battery-stack-75-1|restock-battery-1875-1|restock-battery-375-1]:NEEDS[RealBattery]:FOR[RealBatteryExpansion]
{
    @MODULE[ModuleB9PartSwitch]:HAS[#moduleID[batterySwitch]]
    {
        SUBTYPE
        {
            name = SMES
            title = #LOC_RB_title_SMES
            descriptionSummary = #LOC_RB_descSum_SMES
            descriptionDetail = #LOC_RB_descDet_SMES
            tankType = RB_SMES
            upgradeRequired = RB_UpgradeSMES
            defaultSubtypePriority = 1
            MODULE
            {
                IDENTIFIER
                {
                    name = RealBattery
                }
                DATA
                {
                    ChemistryID = SMES
                    EVAupgrade  = none
                }
            }
        }
    }
}

// ------------------------------------------------------------
// Decal label subtypes (Blockers A+B) — migrated from core RealBatteryLabel.cfg / -small.cfg.
// Per-subtype textures live under RealBatteryExpansion/SMES/Assets/decals/ (shared atlas replaced).
// ------------------------------------------------------------
@PART[RB_Label]:NEEDS[RealBattery,ConformalDecals]:FOR[RealBatteryExpansion]
{
    @MODULE[ModuleB9PartSwitch]
    {
        SUBTYPE
        {
            name = variantSMES
            title = #LOC_RB_title_SMES
            descriptionDetail = #LOC_RB_descDet_decal_SMES
            upgradeRequired = RB_UpgradeSMES
            primaryColor = #0D2B3E
            secondaryColor = #00E5FF
            MODULE
            {
                IDENTIFIER { name = ModuleConformalDecal }
                DATA
                {
                    TEXTURE
                    {
                        name = _Decal
                        isMain = false
                        textureUrl = RealBatteryExpansion/SMES/Assets/decals/decal-SMES
                    }
                }
            }
        }
        SUBTYPE
        {
            name = variantSMES_toasted
            title = #LOC_RB_title_SMES_toasted
            descriptionDetail = #LOC_RB_descDet_decal_SMES
            upgradeRequired = RB_UpgradeSMES
            primaryColor = #0D2B3E
            secondaryColor = #F7F3EB
            MODULE
            {
                IDENTIFIER { name = ModuleConformalDecal }
                DATA
                {
                    TEXTURE
                    {
                        name = _Decal
                        isMain = false
                        textureUrl = RealBatteryExpansion/SMES/Assets/decals/decal-SMES_toasted
                    }
                }
            }
        }
    }
}

