// ============================================================
//  MAGNESIUM-ANTIMONY LIQUID METAL BATTERY  (Mg||Sb LMB)
//  Operates molten at ~700 K. KeepWarmMode = warm with high thresholds.
// ============================================================
REALBATTERY_CHEMISTRY
{
    ChemistryID = MgSb
    displayName = #LOC_RB_short_MgSb
    title = #LOC_RB_title_MgSb
    descriptionSummary = #LOC_RB_descSum_MgSb
    descriptionDetail = #LOC_RB_descDet_MgSb

    HighEClevel = 0.95
    LowEClevel  = 0.90
    Crate       = 1

    CycleDurability     = 30000
    SelfDischargeRate   = 0
    EvaRefurbishEnabled = true
    EVAminLevel         = 4
    SparePartsPerKWh    = 4

    ThermalLoss         = 0.25
    TempOptimal         = 1200
    TempOverheat        = 1500
    TempRunaway         = 99999
    RunawayHeatFactor   = 0

    FixedOutput         = false
    BatteryStaged       = false
    KeepWarmMode        = warm    // upkeep required to stay molten
    TempKeepWarmLo      = 900     // below this: full upkeep cost
    TempKeepWarmHi      = 1000    // above this: no upkeep cost (self-sustaining)
    SelfRunaway         = false
    RunawayBaseChance   = 0.0
    LifeDecay           = false
    InfiniteCycles      = false

    ChargeEfficiencyCurve
    {
        key = 0.0 0.70
        key = 0.1 0.98
        key = 0.9 0.97
        key = 1.0 0.90
    }
}

B9_TANK_TYPE
{
	name = RB_MgSb
    primaryColor = #3D3D3D
    secondaryColor = #FF6600
	tankMass = 0.002
	tankCost = 11

	RESOURCE
	{
		name = ElectricCharge
		unitsPerVolume = 0.40
	}

	RESOURCE
	{
		name = StoredCharge
		unitsPerVolume = 0.25
	}
}

