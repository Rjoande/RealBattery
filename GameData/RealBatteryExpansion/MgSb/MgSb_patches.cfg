// RealBatteryExpansion — MgSb — consolidated @PART patches (Phase 3)
// Runs in :FOR[RealBatteryExpansion] so the core battery switch + base subtypes already exist.
// Missing parts/mods make a @PART no-op, so one patch each covers stock + NF + ReStock.

// ------------------------------------------------------------
// Patch A — add the MgSb SUBTYPE to every host part that carried it in core.
// Uniform; MgSb's own EVAupgrade = none (it is not itself an upgrade source).
// ------------------------------------------------------------
@PART[batteryPack|ksp_r_largeBatteryPack|batteryBank|batteryBankLarge|battery-rad-125|battery-0625|battery-125|battery-25|nflv-battery-stack-5-1|nflv-battery-stack-75-1|restock-battery-1875-1|restock-battery-375-1]:NEEDS[RealBattery]:FOR[RealBatteryExpansion]
{
    @MODULE[ModuleB9PartSwitch]:HAS[#moduleID[batterySwitch]]
    {
        SUBTYPE
        {
            name = MgSb
            title = #LOC_RB_title_MgSb
            descriptionSummary = #LOC_RB_descSum_MgSb
            descriptionDetail = #LOC_RB_descDet_MgSb
            tankType = RB_MgSb
            upgradeRequired = RB_UpgradeMgSb
            defaultSubtypePriority = 9
            MODULE
            {
                IDENTIFIER
                {
                    name = RealBattery
                }
                DATA
                {
                    ChemistryID = MgSb
                    EVAupgrade  = none
                }
            }
        }
    }
}

// ------------------------------------------------------------
// Patch B — cross-boundary compat: restore RBZebra -> MgSb only on the parts that
// originally had that chain. Core sets RBZebra's EVAupgrade = none (so the core mod is
// valid without the expansion); this re-points it to MgSb whenever the expansion is present.
// Only the 8 original RBZebra->MgSb sites (11 host parts); batteryPack has no Zebra tier.
// ------------------------------------------------------------
@PART[ksp_r_largeBatteryPack|batteryBank|batteryBankLarge|battery-rad-125|battery-0625|battery-125|battery-25|nflv-battery-stack-5-1|nflv-battery-stack-75-1|restock-battery-1875-1|restock-battery-375-1]:NEEDS[RealBattery]:FOR[RealBatteryExpansion]
{
    @MODULE[ModuleB9PartSwitch]:HAS[#moduleID[batterySwitch]]
    {
        @SUBTYPE[RBZebra]
        {
            @MODULE:HAS[@IDENTIFIER[RealBattery]]
            {
                @DATA
                {
                    @EVAupgrade = MgSb
                }
            }
        }
    }
}

// ------------------------------------------------------------
// Decal label subtypes (Blockers A+B) — migrated from core RealBatteryLabel.cfg / -small.cfg.
// NOTE: the big-label variantMgSb is repointed from the pre-existing typo #LOC_RB_descDet_decal_LMB
// to the correct #LOC_RB_descDet_decal_MgSb (Pietro: treat _LMB as _MgSb).
// Per-subtype textures live under RealBatteryExpansion/MgSb/Assets/decals/ (shared atlas replaced).
// ------------------------------------------------------------
@PART[RB_Label]:NEEDS[RealBattery,ConformalDecals]:FOR[RealBatteryExpansion]
{
    @MODULE[ModuleB9PartSwitch]
    {
        SUBTYPE
        {
            name = variantMgSb
            title = #LOC_RB_title_MgSb
            descriptionDetail = #LOC_RB_descDet_decal_MgSb
            upgradeRequired = RB_UpgradeMgSb
            primaryColor = #3D3D3D
            secondaryColor = #FF6600
            MODULE
            {
                IDENTIFIER { name = ModuleConformalDecal }
                DATA
                {
                    TEXTURE
                    {
                        name = _Decal
                        isMain = false
                        textureUrl = RealBatteryExpansion/MgSb/Assets/decals/decal-MgSb
                    }
                }
            }
        }
        SUBTYPE
        {
            name = variantMgSb_toasted
            title = #LOC_RB_title_MgSb_toasted
            descriptionDetail = #LOC_RB_descDet_decal_MgSb
            upgradeRequired = RB_UpgradeMgSb
            primaryColor = #3D3D3D
            secondaryColor = #F7F3EB
            MODULE
            {
                IDENTIFIER { name = ModuleConformalDecal }
                DATA
                {
                    TEXTURE
                    {
                        name = _Decal
                        isMain = false
                        textureUrl = RealBatteryExpansion/MgSb/Assets/decals/decal-MgSb_toasted
                    }
                }
            }
        }
    }
}

